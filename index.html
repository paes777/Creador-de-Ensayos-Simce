<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master SIMCE Pro - Motor GPT Libre (V8)</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #3b82f6; 
      --secondary-color: #f43f5e; 
      --science-color: #10b981; 
      --gpt-color: #10a37f;
      --bg-start: #0f172a;
      --bg-end: #020617;
      --text: #f8fafc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
    
    /* DASHBOARD UI */
    .dashboard-wrapper { padding: 3rem; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 3rem; }
    .logo-area { display: flex; align-items: center; gap: 1.5rem; }
    .logo-icon { width: 75px; height: 75px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; background: linear-gradient(135deg, var(--gpt-color), var(--primary-color)); box-shadow: 0 10px 30px rgba(16, 163, 127, 0.4); }
    .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #6ee7b7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .grid-layout { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 2.5rem; }
    .panel-section { display: flex; flex-direction: column; gap: 1.2rem; }
    .panel-section h2 { font-size: 1.4rem; color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.8rem; }
    
    .btn-card { padding: 1.8rem; border-radius: 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; background: rgba(0,0,0,0.3); font-size: 1.2rem; display: flex; align-items: center; gap: 1rem; font-weight: 600; color: #94a3b8; }
    .btn-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); color: white; }
    
    .btn-card.active.truf { border-color: #38bdf8; background: rgba(56, 189, 248, 0.15); color: white; box-shadow: 0 0 25px rgba(56, 189, 248, 0.2); }
    .btn-card.active.met { border-color: #fbbf24; background: rgba(251, 191, 36, 0.15); color: white; box-shadow: 0 0 25px rgba(251, 191, 36, 0.2); }
    .btn-card.active.grade { border-color: var(--text); background: rgba(255, 255, 255, 0.15); color: white; }
    
    .subj-card { text-align: center; flex-direction: column; opacity: 0.4; pointer-events: none; justify-content: center; height: 100%; transition: 0.4s; }
    .subj-card.ena { opacity: 1; pointer-events: auto; }
    .active.lec { border-color: var(--secondary-color); background: rgba(244,63,94,0.15); color: white; box-shadow: 0 0 25px rgba(244,63,94,0.3); transform: scale(1.02); }
    .active.mat { border-color: var(--primary-color); background: rgba(59,130,246,0.15); color: white; box-shadow: 0 0 25px rgba(59,130,246,0.3); transform: scale(1.02); }
    .active.sci { border-color: var(--science-color); background: rgba(16,185,129,0.15); color: white; box-shadow: 0 0 25px rgba(16,185,129,0.3); transform: scale(1.02); }
    
    .generate-wrap { margin-top: 3rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .gen-btn { font-size: 1.5rem; padding: 1.5rem 4rem; border-radius: 99px; border: none; font-weight: 800; background: #1e293b; color: #64748b; cursor: not-allowed; transition: all 0.4s; display: inline-flex; align-items: center; gap: 1rem; }
    .gen-btn.ready { background: linear-gradient(135deg, var(--gpt-color), var(--primary-color)); color: white; cursor: pointer; box-shadow: 0 15px 40px rgba(16, 163, 127, 0.5); }
    .gen-btn.ready:hover { transform: scale(1.05) translateY(-5px); }

    /* SPINNER */
    .loading-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: white;}
    .gpt-spinner { width: 80px; height: 80px; border-radius: 50%; border: 4px solid transparent; border-top-color: var(--gpt-color); border-right-color: var(--primary-color); animation: spin 1s linear infinite; margin-bottom: 2rem; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .load-text { font-size: 1.8rem; font-weight: 800; font-family: 'Outfit'; background: linear-gradient(to right, #6ee7b7, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center;}
    .load-sub { color: #94a3b8; font-size: 1.1rem; margin-top: 1rem; max-width: 500px; text-align: center;}

    /* VIEWER */
    .viewer { background: #f1f5f9; min-height: 100vh; color: #0f172a; display: flex; flex-direction: column; }
    .toolbar { background: #0f172a; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; transition: 0.2s; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .btn-print { background: var(--gpt-color); color: white; box-shadow: 0 4px 15px rgba(16, 163, 127, 0.4); }
    .btn-print:hover { transform: translateY(-3px); }

    .doc-container { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; gap: 3rem; }
    .page { background: white; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 15px solid; position: relative; font-family: 'Arial', sans-serif; border-radius: 8px; }
    .page.lec { border-top-color: var(--secondary-color); }
    .page.mat { border-top-color: var(--primary-color); }
    .page.sci { border-top-color: var(--science-color); }
    .pauta-page { border-top-color: #dc2626 !important; }

    .cover-header { display: flex; justify-content: space-between; border-bottom: 4px solid #cbd5e1; padding-bottom: 1.5rem; margin-bottom: 3rem; }
    .school-sig { display: flex; align-items: center; gap: 1rem; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; color: #1e293b;}
    
    .title-area { text-align: center; margin: 4rem 0; }
    .title-area h1 { font-size: 3.5rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -2px; text-transform: uppercase; }
    .title-area h2 { font-size: 2rem; color: #64748b; }
    
    .student-box { border: 3px solid #64748b; border-radius: 12px; padding: 2.5rem; margin-bottom: 3rem; }
    .s-row { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; font-weight: bold; font-size: 1.2rem; }
    .s-line { flex: 1; border-bottom: 2px solid #94a3b8; height: 1.5rem; }
    
    .instruct { background: #f8fafc; padding: 2.5rem; border-left: 8px solid #475569; border-radius: 0 12px 12px 0; }
    .instruct h3 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #0f172a; }
    .instruct li { margin-bottom: 1rem; font-size: 1.2rem; line-height: 1.6; color: #334155; }
    
    .q-flow { display: flex; flex-direction: column; gap: 4rem; }
    .q-item { page-break-inside: avoid; border-bottom: 1px dashed #cbd5e1; padding-bottom: 2rem; }
    .q-head { display: flex; gap: 1.5rem; font-size: 1.25rem; color: #0f172a; margin-bottom: 1.5rem; }
    .q-num { font-weight: 900; font-size: 1.5rem; color: #1e293b; min-width: 35px; }
    .q-text { line-height: 1.6; font-weight: 600; font-family: 'Arial', sans-serif;}
    
    .q-img { margin: 2rem 0; text-align: center;}
    .q-img img { max-width: 80%; max-height: 350px; border: 4px solid white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); object-fit: contain; }

    .alts { display: flex; flex-direction: column; gap: 1.2rem; padding-left: 3rem; }
    .alt-row { display: flex; gap: 1rem; color: #1e293b; font-size: 1.2rem; line-height: 1.4; align-items: flex-start; }
    .alt-let { font-weight: 900; color: #0f172a; }
    
    .dev-box { margin-left: 3rem; margin-top: 2rem; border: 2px solid #cbd5e1; height: 250px; border-radius: 12px; padding: 1.5rem; background: #fdf8f6; }
    .dev-inner-lines { width: 100%; height: 100%; background-image: repeating-linear-gradient(transparent, transparent 31px, #cbd5e1 31px, #cbd5e1 32px); }

    .reading-box { border: 3px solid #e2e8f0; padding: 3rem; border-radius: 16px; margin-bottom: 3.5rem; background: #fff; box-shadow: inset 0 0 40px rgba(0,0,0,0.02); page-break-inside: auto; }
    .r-title { text-align: center; font-size: 2rem; font-weight: 900; margin-bottom: 2rem; color: #0f172a; border-bottom: 2px dotted #cbd5e1; padding-bottom: 1rem;}
    .r-txt { font-size: 1.25rem; line-height: 1.9; text-align: justify; color: #1e293b; white-space: pre-wrap; font-family: 'Times New Roman', serif;}

    /* OMR */
    .omr { border: 3px solid #0f172a; border-radius: 12px; padding: 3rem; margin-top: 3rem; }
    .omr-grid { display: flex; justify-content: space-around; gap: 2rem; flex-wrap: wrap; }
    .omr-col { display: flex; flex-direction: column; gap: 1.2rem; }
    .o-row { display: flex; align-items: center; gap: 1.5rem; }
    .o-num { width: 35px; font-weight: 900; font-size: 1.2rem; text-align: right; }
    .o-b { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 2px solid #0f172a; border-radius: 50%; font-size: 0.9rem; font-weight: bold; }

    /* PAUTA DOCENTE */
    .pauta-docente-header { background: #dc2626; color: white; padding: 2rem; text-align: center; font-size: 2rem; font-weight: 900; text-transform: uppercase; border-radius: 12px; margin-bottom: 2rem; }
    .pauta-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 1.1rem; }
    .pauta-table th, .pauta-table td { border: 2px solid #cbd5e1; padding: 1rem; text-align: left; }
    .pauta-table th { background: #1e293b; color: white; font-weight: bold; text-transform: uppercase; }
    .pauta-table tr:nth-child(even) { background-color: #f8fafc; }
    .sol-dev { background: #fef3c7 !important; color: #b45309; }

    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .doc-container { padding: 0 !important; gap: 0 !important; }
      .page { box-shadow: none !important; margin: 0 !important; width: 100% !important; border-radius: 0 !important; page-break-after: always; padding: 2cm !important; }
      .page:last-child { page-break-after: auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const IconShield = () => <span style={{fontSize:'2.5rem'}}>🛡️</span>;
    const IconMetrenco = () => <span style={{fontSize:'2.5rem'}}>🏫</span>;

    // ==========================================
    // MOTOR IA LIBRE CHUNKED (ANTI-TRUNCATION)
    // ==========================================
    const fetchChunk = async (grade, subject, startId, endId, isDev, reqText) => {
      let formatInst = isDev 
        ? `- Del ${startId} al 31: Selección múltiple. Del 32 al ${endId}: Desarrollo (sin alternativas, déjalo en un array vacío []).`
        : `- TODAS son de Selección múltiple (propiedad 'alternativas' obligatoria con 4 opciones A, B, C, D).`;
      
      let textInst = reqText 
        ? `En la pregunta ID ${startId}, crea una LECTURA INTERESANTE Y LARGA (Mito chileno, artículo real) en la propiedad 'textoLectura'. Las siguientes preguntas básalas en el texto.`
        : `Deja 'textoLectura' como null en todas las preguntas de este bloque.`;

      const prompt = `ERES EL MINISTERIO DE EDUCACIÓN CHILENO.
Genera un ARRAY JSON con EXACTAMENTE ${endId - startId + 1} objetos de preguntas para ${subject} de ${grade} Básico.
Los IDs exactos deben ir del ${startId} al ${endId}.

REGLAS DE FORMATO RIGUROSAS:
- id: (número asignado en orden)
- tipo: "seleccion" o "desarrollo"
- eje: (string del tema)
- textoLectura: (string o null)
- enunciado: (string)
- imageUrl: (Debe ir una URL estricta O null. CREA AL MENOS 2 PREGUNTAS con esta URL: "https://image.pollinations.ai/prompt/{descripcion_ingles_unida_con_guion_bajo}?width=600&height=350&nologo=true")
- alternativas: (Array de 4 strings o [])
- correcta: (string de la respuesta correcta o rúbrica de corrección para el docente si es desarrollo)

${formatInst}
${textInst}
Usa ciudades chilenas y personajes locales. NUNCA insertes texto Markdown (como \`\`\`json). SOLO EL ARREGLO PLANO COMENZANDO CON [ Y TERMINANDO CON ].`;

      const response = await fetch("https://text.pollinations.ai/openai", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: "system", content: "Returns ONLY valid JSON. No intro, no outro, NO MARKDOWN." },
              { role: "user", content: prompt }
            ],
            model: "openai",
            jsonMode: true
          })
      });
      
      if (!response.ok) throw new Error("Fallo de conexión OpenAI Proxy");
      
      const rawRes = await response.json();
      let rawText = rawRes.choices ? rawRes.choices[0].message.content : rawRes;
      
      // Limpiamos estrictamente el string para forzar JSON válido
      let cutStart = rawText.indexOf('[');
      let cutEnd = rawText.lastIndexOf(']');
      if (cutStart !== -1 && cutEnd !== -1) {
          rawText = rawText.substring(cutStart, cutEnd + 1);
      }
      
      try {
         return JSON.parse(rawText);
      } catch(e) {
         throw new Error("Truncamiento detectado en el Chunk. El texto no cerró los corchetes correctamente.");
      }
    };

    const generateTestWithAI = async (school, grade, subject) => {
        // Al dividir la carga en 3 hilos paralelos, sorteamos los Límites de Tokens de OpenAI
        // Evitando al 100% que el JSON se corte a la mitad, y triplicando la velocidad de creación.
        const p1 = fetchChunk(grade, subject, 1, 12, false, subject === 'lectura');
        const p2 = fetchChunk(grade, subject, 13, 24, false, subject === 'lectura');
        const p3 = fetchChunk(grade, subject, 25, 35, true, false);

        const chunks = await Promise.all([p1, p2, p3]);
        
        let masterTest = [];
        chunks.forEach(ch => { masterTest = masterTest.concat(ch); });
        
        // Re-mapear IDs forzosamente asegurando la secuencia perfecta 1-35.
        masterTest.forEach((item, index) => { item.id = index + 1; });
        return masterTest;
    };


    // ==========================================
    // INTERFAZ REACT
    // ==========================================
    const App = () => {
      const [view, setView] = useState('dash');
      const [config, setConfig] = useState({});
      const [testData, setTestData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [loadMsg, setLoadMsg] = useState("");

      const handleGenerate = async (school, grade, subject) => {
        try {
          setLoading(true);
          setLoadMsg("Conectando con el Motor Open Libre...");
          
          setTimeout(() => setLoadMsg(`ChatGPT está creando la base pedagógica curricular para ${grade}...`), 2000);
          setTimeout(() => setLoadMsg(`El proceso gratuito suele durar 20 segundos fabricando las 35 preguntas y rúbricas.`), 8000);

          const data = await generateTestWithAI(school, grade, subject);
          
          setConfig({ school, grade, subject });
          setTestData(data);
          setView('view');
          
        } catch (error) {
          alert("💥 Error de Red GPT: " + error.message + ".\n\nEs normal si el Servidor Gratuito colapsó en ese segundo. ¡Solo trata de darle al botón Generar denuevo pacientemente!");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div>
          {loading && (
             <div className="loading-overlay">
                <div className="gpt-spinner"></div>
                <div className="load-text">{loadMsg}</div>
                <div className="load-sub">La Inteligencia Artificial está generando sin usar llaves pagadas. Es totalmente libre y de alta vanguardia para la comunidad educativa de Chile.</div>
             </div>
          )}
          {view === 'dash' 
            ? <Dashboard onGen={handleGenerate} /> 
            : <PdfViewer cfg={config} test={testData} onBack={() => setView('dash')} />
          }
        </div>
      );
    };

    const Dashboard = ({ onGen }) => {
      const [sc, setSc] = useState('');
      const [gr, setGr] = useState('');
      const [su, setSu] = useState('');
      const ready = sc && gr && su;

      return (
        <div className="dashboard-wrapper">
          <div className="header glass-panel">
            <div className="logo-area"><div className="logo-icon"><h2>🤖</h2></div> 
            <div><h1>SIMCE ENGINE: IA Abierta</h1><p style={{color:'#cbd5e1', fontSize:'1.1rem'}}>Conectado a OpenAI ChatGPT Gratis Permanente (V8)</p></div></div>
          </div>
          
          <div className="grid-layout">
             <div className="panel-section">
              <h2>🏢 1. Seleccionar Institución</h2>
              <div className={`btn-card glass-panel ${sc==='Escuela Truf-Truf'?'active truf':''}`} onClick={()=>setSc('Escuela Truf-Truf')}>🛡️ Escuela Truf-Truf</div>
              <div className={`btn-card glass-panel ${sc==='Escuela Metrenco'?'active met':''}`} onClick={()=>setSc('Escuela Metrenco')}>🏫 Escuela Metrenco</div>
            </div>

            <div className="panel-section">
              <h2>🎓 2. Asignar Nivel</h2>
              <div className={`btn-card glass-panel ${gr==='4to'?'active grade':''}`} onClick={()=>{setGr('4to'); setSu('');}}>4° Básico</div>
              <div className={`btn-card glass-panel ${gr==='6to'?'active grade':''}`} onClick={()=>{setGr('6to'); setSu('');}}>6° Básico</div>
            </div>

            <div className="panel-section">
              <h2>📚 3. Empezar Generación</h2>
              <div style={{display:'grid', gap:'1.2rem', gridTemplateColumns:'1fr 1fr', height:'100%'}}>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='lectura'?'active lec':''}`} onClick={()=>gr&&setSu('lectura')}>📖 Lectura</div>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='matematica'?'active mat':''}`} onClick={()=>gr&&setSu('matematica')}>🧮 Matemática</div>
                {gr === '6to' && <div className={`btn-card subj-card ena ${su==='ciencias'?'active sci':''}`} style={{gridColumn:'span 2'}} onClick={()=>setSu('ciencias')}>🧬 Ciencias Naturales</div>}
              </div>
            </div>
          </div>

          <div className="generate-wrap">
            <button className={`gen-btn ${ready?'ready':''}`} onClick={() => ready && onGen(sc, gr, su)}>
               ✨ Iniciar Creación de Ensayo SIMCE Integral
            </button>
            <p style={{marginTop:'1.5rem', color:'#94a3b8', fontSize:'0.9rem', maxWidth:'600px'}}>Esta versión ha sido hackeada al nivel más benevolente: No necesita LLAVES DE API de Google jamás. Toca, genera, imprime y educa.</p>
          </div>
        </div>
      );
    };

    const PdfViewer = ({ cfg, test, onBack }) => {
      const sjName = cfg.subject === 'lectura' ? 'Lectura' : cfg.subject === 'matematica' ? 'Matemática' : 'Ciencias Naturales';
      const grName = cfg.grade === '4to' ? '4° Básico' : '6° Básico';
      const cClass = cfg.subject === 'lectura' ? 'lec' : cfg.subject === 'matematica' ? 'mat' : 'sci';
      
      const mcqs = test.filter(t => t.tipo === 'seleccion');
      
      return (
        <div className="viewer" id="pdf-start">
          <div className="toolbar no-print">
             <button className="btn btn-back" onClick={onBack}>← Volver al Centro de Control</button>
             <span style={{fontSize:'1.2rem', fontWeight:'bold'}}>✅ {cfg.school} | Pincel Acuarela y Redacción Completada</span>
             <button className="btn btn-print" onClick={()=>window.print()}>🖨️ Desplegar e Imprimir Todo en A4</button>
          </div>

          <div className="doc-container">
            {/* PORTADA ALUMNO */}
            <div className={`page ${cClass}`}>
              <div className="cover-header">
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} {cfg.school}</div>
                <div style={{textAlign:'right', color:'#64748b'}}><b>Agencia Nacional de Calidad</b><br/>Validación Oficial ChatGPT</div>
              </div>
              
              <div className="title-area">
                <h1>CUADERNILLO NACIONAL</h1>
                <h2>Solemne de {sjName} - {grName}</h2>
              </div>
              
              <div className="student-box">
                <div className="s-row">Estudiante: <div className="s-line"></div></div>
                <div className="s-row" style={{marginBottom:0}}>
                   <span style={{width:'50%', display:'flex'}}>RUT: <div className="s-line"></div></span>
                   <span style={{width:'50%', display:'flex'}}>Fecha: <div className="s-line"></div></span>
                </div>
              </div>

              <div className="instruct">
                <h3>INSTRUCCIONES DE DESARROLLO</h3>
                <ul>
                  <li>Cuadernillo personalizado e ilustrado de <strong>{test.length} preguntas</strong> ({mcqs.length} múltiples y 4 desarrollo).</li>
                  <li>Las alternativas llénalas cuidadosamente al final en tu <strong>Lector Óptico</strong>, sin marcar X.</li>
                  <li>Las preguntas en espacio blanco (abiertas) redáctalas de forma clara y extensa.</li>
                  <li>Tienes 90 minutos para dar lo mejor de ti. Mantén silencio y revisa al terminar.</li>
                </ul>
              </div>
            </div>

            {/* PREGUNTAS ALUMNO */}
            <div className={`page ${cClass}`}>
               <div style={{borderBottom:'4px solid #0f172a', paddingBottom:'15px', marginBottom:'40px', fontSize:'1.4rem', fontWeight:'900', textTransform:'uppercase'}}>
                 DESARROLLO DE LA EVALUACIÓN
               </div>
               <div className="q-flow">
                 {test.map((q) => {
                   return (
                     <div key={q.id} className="q-item">
                        {q.textoLectura && (
                          <div className="reading-box" style={{breakInside:'auto'}}>
                             <div className="r-title">LECTURA PRINCIPAL</div>
                             <div className="r-txt">{q.textoLectura}</div>
                          </div>
                        )}

                        <div className="q-head">
                          <span className="q-num">{q.id}.</span> 
                          <span className="q-text">{q.enunciado}</span>
                        </div>
                        
                        {q.imageUrl && (
                          <div className="q-img">
                             <img src={q.imageUrl} alt="Ilustración Mineduc" crossOrigin="anonymous" />
                          </div>
                        )}

                        {q.tipo === 'seleccion' ? (
                          <div className="alts">
                            {q.alternativas && q.alternativas.map((alt, i) => {
                              let safeAlt = alt.length > 3 ? alt : `${['A','B','C','D'][i]}) ${alt}`;
                              return (
                                <div key={i} className="alt-row">
                                   <span className="alt-let">{safeAlt.substring(0,2)}</span>
                                   {safeAlt.substring(3)}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="dev-box">
                             <div className="dev-inner-lines"></div>
                          </div>
                        )}
                     </div>
                   )
                 })}
               </div>
            </div>

            {/* HOJA OMR LECTOR OPTICO */}
            <div className="page" style={{pageBreakBefore:'always'}}>
              <div className="cover-header" style={{borderBottomColor:'#0f172a'}}>
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} LECTOR DIGITAL</div>
                <div style={{fontWeight:'bold', fontSize:'1.2rem', color:'#475569'}}>HOJA DE RESPUESTAS OFICIAL</div>
              </div>
              <div className="student-box" style={{padding:'1.5rem', borderWidth:'2px'}}>
                 <div className="s-row" style={{marginBottom:0}}>Nombre del Estudiante: <div className="s-line" style={{borderStyle:'dashed', borderColor:'black'}}></div></div>
              </div>
              
              <div className="omr">
                 <div className="omr-title">{sjName.toUpperCase()}</div>
                 <div style={{textAlign:'center', marginBottom:'3rem', fontWeight:'bold', color:'#334155'}}>Pinte COMPLETAMENTE el círculo interior con lápiz grafito. No marque cruces.</div>
                 
                 <div className="omr-grid">
                    {[0, 11, 22].map(colStart => (
                      <div key={colStart} className="omr-col">
                        {mcqs.slice(colStart, colStart+11).map((q) => {
                           let realID = mcqs.indexOf(q) + 1;
                           return (
                             <div key={q.id} className="o-row">
                               <div className="o-num">{realID}</div>
                               <div className="o-b">A</div><div className="o-b">B</div><div className="o-b">C</div><div className="o-b">D</div>
                             </div>
                           )
                        })}
                      </div>
                    ))}
                 </div>
              </div>
            </div>

            {/* DOCUMENTO EXTREMADAMENTE SECRETO PARA DOCENTE */}
            <div className="page pauta-page">
               <div className="pauta-docente-header">
                 DOCUMENTO EXCLUSIVO DOCENTE<br/>
                 <span style={{fontSize:'1.5rem', fontWeight:'600', color:'#fca5a5'}}>SOLUCIONARIO V8 - IA ABIERTA</span>
               </div>
               
               <table className="pauta-table">
                  <thead>
                    <tr>
                      <th style={{width:'50px', textAlign:'center'}}>Nº</th>
                      <th style={{width:'150px'}}>EJE EVALUADO</th>
                      <th style={{width:'100px', textAlign:'center'}}>TIPO</th>
                      <th>RESPUESTA CLAVE Y/O RÚBRICA</th>
                    </tr>
                  </thead>
                  <tbody>
                    {test.map((q, idx) => (
                      <tr key={'p'+q.id}>
                        <td style={{textAlign:'center', fontWeight:'bold', fontSize:'1.3rem'}}>{idx+1}</td>
                        <td style={{fontWeight:'bold', color:'#475569'}}>{q.eje}</td>
                        <td style={{textAlign:'center'}}>{q.tipo === 'seleccion' ? 'Opción' : 'Abierto'}</td>
                        <td className={q.tipo === 'desarrollo' ? 'sol-dev' : ''}>
                           {q.tipo === 'seleccion' ? (
                             <strong style={{color:'#2563eb', fontSize:'1.3rem'}}>{q.correcta.substring(0, 2)}</strong>
                           ) : (
                             <div>{q.correcta}</div>
                           )}
                           {q.tipo === 'seleccion' && <span style={{marginLeft:'0.5rem', color:'#475569'}}>{q.correcta.substring(3)}</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
               </table>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
