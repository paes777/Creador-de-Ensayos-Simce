  <script type="text/babel">
    // =========================================================================
    // ⚙️ CONFIGURACIÓN MAESTRA DEL ADMINISTRADOR (MODO PADRINO)
    // 
    // INSTRUCCIÓN OBLIGATORIA: Para que sus docentes no tengan que colocar una clave
    // manual y no les tire "Error", obtenga en Google su Llave API (AIstudio.google.com).
    // Pegue LA LLAVE DE LETRAS LARGAS EXACTAMENTE ENTRE LAS COMILLAS abajo y guarde el doc.
    // 
    // Ejemplo: const GEMINI_API_KEY = "AIzaSyXXXXXXXXXX-XXXXXXXXXXXXXXXXXX";
    // =========================================================================

    const GEMINI_API_KEY = "AIzaSyBb-HStxrY10b2UJuKEXyzfV3fH-jvfp7o";


    const { useState, useEffect } = React;
    const IconShield = () => <span style={{ fontSize: '2.5rem' }}>🛡️</span>;
    const IconMetrenco = () => <span style={{ fontSize: '2.5rem' }}>🏫</span>;

    const generateTestWithAI = async (school, grade, subject) => {
      const prompt = `ERES EL EQUIPO TÉCNICO EXPERTO DEL MINISTERIO DE EDUCACIÓN DE CHILE (MINEDUC / AGENCIA DE CALIDAD).
Crea un Ensayo Original Oficial para ${grade} y la asignatura de ${subject}.
Necesitas producir **EXACTAMENTE 35 PREGUNTAS** inéditas en nivel pedagógico superior.
- Del 1 al 31: Selección múltiple (con 4 alternativas y la correcta).
- Del 32 al 35: Desarrollo (preguntas abiertas para que justifiquen en líneas escritas).

**INSTRUCCIONES CLAVE DE CALIDAD (NO REPETITIVAS):**
1. ¡CADA pregunta debe ser completamente diferente a la otra en concepto, variables y eje!
2. Usa contextos hiper-específicos de Chile para los niños (lugares, nombres como Javiera o Alonso, fauna nacional endémica (pudú, cóndor), tradiciones, y la vida real de campamentos o comparar en ferias).
3. **IMÁGENES (ESTILO EDITORIAL):** Al menos 6 preguntas a lo largo del ensayo NECESITAN un apoyo visual descriptivo (un ecosistema dibujado, fracciones gráficas o niños realizando tareas). 
   Para hacer esto, debes utilizar el enlace en "imageUrl" con esta regla **obligatoria**:
   - URL BASE: "https://image.pollinations.ai/prompt/"
   - PROMPT Inglés unido por guiones bajos.
   - TEXTO OBLIGATORIO AL FINAL DE LA URL: "?width=600&height=350&nologo=true"
   - EJEMPLO PERFECTO: "https://image.pollinations.ai/prompt/chilean_boy_measuring_table_watercolor_sketch?width=600&height=350&nologo=true"
4. **LECTURAS (SI ES LENGUAJE):** Redacta 2 Textos gigantescos completos (Cuento, Leyenda mapuche o texto informativo) que pondrás en el atributo "textoLectura" al inicio de las preguntas 1 y 16, elaborando preguntas profundas de inferencia debajo de ellos.

**ESTRUCTURA JSON EXACTA DE REQUERIDA (NO INCLUYAS MARKDOWN NI \`\`\`json, SOLO EL CORCHETE INICIAL):**
[
  { 
    "id": 1, 
    "tipo": "seleccion", 
    "eje": "Tema o Eje MINEDUC", 
    "textoLectura": "Aquí va un el texto largo de 3 párrafos de la historia (SÓLO pon esto en la primera pregunta donde la lectura sea necesaria, en el resto pon null).",
    "enunciado": "La leyenda cuenta que...", 
    "imageUrl": "https://image.pollinations.ai/prompt/chilean_legend_watercolor?width=600&height=350&nologo=true", 
    "alternativas": ["A) ", "B) ", "C) ", "D) "], 
    "correcta": "A) ..." 
  },
  ... Haz esto hasta llegar a 35! Si es "desarrollo", las alternativas van vacías [].
]
Revisa rigurosamente las llaves del JSON para que no falle. Sé brillante en tus redacciones, sorprenderás a la escuela ${school}.`;

      let jsonRes = null;
      let lastError = null;
      
      const models_to_try = ['gemini-1.5-pro-latest', 'gemini-pro', 'gemini-1.5-flash-latest', 'gemini-1.5-flash'];
      for (const m of models_to_try) {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${GEMINI_API_KEY}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.9, maxOutputTokens: 8192 },
                safetySettings: [
                  { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                  { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                  { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                  { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                ]
              })
          });
          
          if (response.ok) {
              jsonRes = await response.json();
              lastError = null;
              break; // Éxito!
          } else {
              lastError = await response.text();
          }
      }
      
      if (lastError) {
          console.error("Ningún modelo de Google funcionó:", lastError);
          throw new Error("Google nos informa: " + lastError);
      }
      
      if (jsonRes.promptFeedback && jsonRes.promptFeedback.blockReason) {
         throw new Error("Google bloqueó el texto por seguridad: " + jsonRes.promptFeedback.blockReason);
      }
      
      if (!jsonRes.candidates || jsonRes.candidates.length === 0) {
         throw new Error("La IA no devolvió candidatos. Posible bloqueo de contenido.");
      }

      let rawText = jsonRes.candidates[0].content.parts[0].text;
      
      if (!rawText) throw new Error("La IA devolvió un texto vacío.");

      // Limpieza robusta de JSON markdown
      rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
      
      try {
        const testArray = JSON.parse(rawText);
        if (!Array.isArray(testArray) || testArray.length < 5) throw new Error("La IA no formó un arreglo válido.");
        return testArray;
      } catch (parseErr) {
        console.error("JSON Roto recibido de la IA:", rawText);
        throw new Error("El cerebro procesó mal la estructura JSON. Por favor oprime Generar nuevamente.");
      }
    };


    // ==========================================
    // INTERFAZ REACT
    // ==========================================
    const App = () => {
      const [view, setView] = useState('dash');
      const [config, setConfig] = useState({});
      const [testData, setTestData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [loadMsg, setLoadMsg] = useState("");

      const handleGenerate = async (school, grade, subject) => {
        if (!GEMINI_API_KEY || GEMINI_API_KEY === "AQUI_PEGA_LA_LLAVE_API_DE_GEMINI_STUDIO") {
          alert("⚠️ ATENCIÓN DIRECTOR(A) DEL SISTEMA:\n\nEl sistema intentó usar el Motor Gemini pero no ha detectado la Llave API Oculta en el código.\n\nPor favor, abra este archivo HTML (VISUALIZAR_PLATAFORMA_SIMCE.html) en el 'Bloc de Notas' o 'NotePad++', encuentre la línea 99 donde dice 'AQUI_PEGA_LA_LLAVE_API...' y reemplácela por la llave real que Google le regala.");
          return;
        }

        try {
          setLoading(true);
          setLoadMsg("Iniciando Transmisión Neuronal con Gemini 1.5...");

          setTimeout(() => setLoadMsg(`El equipo IA analizando el plan curricular para ${grade}...`), 2000);
          setTimeout(() => setLoadMsg(`Redactando de modo profesional 35 interrogantes lógicas... (Esto tomará 15-20 segundos)`), 8000);

          const data = await generateTestWithAI(school, grade, subject);

          setConfig({ school, grade, subject });
          setTestData(data);
          setView('view');

        } catch (error) {
          alert("💥 Error Técnico en el Motor: " + error.message + ".\n\nVerifique que pegó la API KEY correctamente en el texto y que el sitio sí tenga conexión de red.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div>
          {loading && (
            <div className="loading-overlay">
              <div className="gemini-spinner"></div>
              <div className="load-text">{loadMsg}</div>
              <div className="load-sub">La Inteligencia Artificial está operando sin contraseñas públicas con el 'Modelo Oculto del Docente'. Solo espere un momento que el cuadernillo maestro terminará de escribirse gratis de la nada.</div>
            </div>
          )}
          {view === 'dash'
            ? <Dashboard onGen={handleGenerate} isKeySet={GEMINI_API_KEY && GEMINI_API_KEY !== "AQUI_PEGA_LA_LLAVE_API_DE_GEMINI_STUDIO"} />
            : <PdfViewer cfg={config} test={testData} onBack={() => setView('dash')} />
          }
        </div>
      );
    };

    const Dashboard = ({ onGen, isKeySet }) => {
      const [sc, setSc] = useState('');
      const [gr, setGr] = useState('');
      const [su, setSu] = useState('');
      const ready = sc && gr && su;

      return (
        <div className="dashboard-wrapper">
          <div className="header glass-panel">
            <div className="logo-area"><div className="logo-icon"><h2>AI</h2></div>
              <div><h1>SIMCE ENGINE: Gemini V7</h1><p style={{ color: '#cbd5e1', fontSize: '1.1rem' }}>Plataforma Integrada Oculta (Nivel Editorial Mineduc)</p></div></div>
          </div>

          {!isKeySet ? (
            <div className="admin-msg-box glass-panel" style={{ margin: '0 auto', textAlign: 'center' }}>
              <h3>⚠️ ACCIÓN DE CONFIGURACIÓN REQUERIDA EN EL CÓDIGO ⚠️</h3>
              <p style={{ marginTop: '0.5rem' }}>Este software está listo, pero tú **aún no pegas la clave de Google** en el interior secreto del archivo (Línea 99 de tu código). Para obtener tu clave gratis, entra a <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{ color: '#fca5a5' }}>aistudio.google.com</a>, cópiala, ponla en el código código fuente, y sube el archivo devuelta a tu GitHub para que tus docentes puedan utilizar esto infinitamente.</p>
            </div>
          ) : null}

          <div className="grid-layout" style={{ marginTop: !isKeySet ? 0 : '1rem' }}>
            <div className="panel-section">
              <h2>🏢 1. Seleccionar Institución</h2>
              <div className={`btn-card glass-panel ${sc === 'Escuela Truf-Truf' ? 'active truf' : ''}`} onClick={() => setSc('Escuela Truf-Truf')}>🛡️ Escuela Truf-Truf</div>
              <div className={`btn-card glass-panel ${sc === 'Escuela Metrenco' ? 'active met' : ''}`} onClick={() => setSc('Escuela Metrenco')}>🏫 Escuela Metrenco</div>
            </div>

            <div className="panel-section">
              <h2>🎓 2. Asignar Nivel</h2>
              <div className={`btn-card glass-panel ${gr === '4to' ? 'active grade' : ''}`} onClick={() => { setGr('4to'); setSu(''); }}>4° Básico</div>
              <div className={`btn-card glass-panel ${gr === '6to' ? 'active grade' : ''}`} onClick={() => { setGr('6to'); setSu(''); }}>6° Básico</div>
            </div>

            <div className="panel-section">
              <h2>📚 3. Compilar IA Nativa</h2>
              <div style={{ display: 'grid', gap: '1.2rem', gridTemplateColumns: '1fr 1fr', height: '100%' }}>
                <div className={`btn-card subj-card ${gr ? 'ena' : ''} ${su === 'lectura' ? 'active lec' : ''}`} onClick={() => gr && setSu('lectura')}>📖 Lectura</div>
                <div className={`btn-card subj-card ${gr ? 'ena' : ''} ${su === 'matematica' ? 'active mat' : ''}`} onClick={() => gr && setSu('matematica')}>🧮 Matemática</div>
                {gr === '6to' && <div className={`btn-card subj-card ena ${su === 'ciencias' ? 'active sci' : ''}`} style={{ gridColumn: 'span 2' }} onClick={() => setSu('ciencias')}>🧬 Ciencias Naturales</div>}
              </div>
            </div>
          </div>

          <div className="generate-wrap">
            <button className={`gen-btn ${ready ? 'ready' : ''}`} onClick={() => ready && onGen(sc, gr, su)}>
              ✨ Redactar Nuevo Cuadernillo con Gemini
            </button>
          </div>
        </div>
      );
    };

    const PdfViewer = ({ cfg, test, onBack }) => {
      const sjName = cfg.subject === 'lectura' ? 'Lectura' : cfg.subject === 'matematica' ? 'Matemática' : 'Ciencias Naturales';
      const grName = cfg.grade === '4to' ? '4° Básico' : '6° Básico';
      const cClass = cfg.subject === 'lectura' ? 'lec' : cfg.subject === 'matematica' ? 'mat' : 'sci';

      const mcqs = test.filter(t => t.tipo === 'seleccion');

      return (
        <div className="viewer" id="pdf-start">
          <div className="toolbar no-print">
            <button className="btn btn-back" onClick={onBack}>← Crear Otra Prueba</button>
            <span style={{ fontSize: '1.2rem', fontWeight: 'bold' }}>✅ {cfg.school} | Pincel Acuarela y Redacción Completada</span>
            <button className="btn btn-print" onClick={() => window.print()}>🖨️ Desplegar e Imprimir Todo en A4</button>
          </div>

          <div className="doc-container">
            {/* PORTADA ALUMNO */}
            <div className={`page ${cClass}`}>
              <div className="cover-header">
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield /> : <IconMetrenco />} {cfg.school}</div>
                <div style={{ textAlign: 'right', color: '#64748b' }}><b>Agencia Nacional de Gemini AI</b><br />Validación Oficial</div>
              </div>

              <div className="title-area">
                <h1>CUADERNILLO NACIONAL</h1>
                <h2>Solemne de {sjName} - {grName}</h2>
              </div>

              <div className="student-box">
                <div className="s-row">Estudiante: <div className="s-line"></div></div>
                <div className="s-row" style={{ marginBottom: 0 }}>
                  <span style={{ width: '50%', display: 'flex' }}>RUT: <div className="s-line"></div></span>
                  <span style={{ width: '50%', display: 'flex' }}>Fecha: <div className="s-line"></div></span>
                </div>
              </div>

              <div className="instruct">
                <h3>INSTRUCCIONES DE DESARROLLO</h3>
                <ul>
                  <li>Cuadernillo personalizado e ilustrado con IA, contiene <strong>{test.length} preguntas</strong> ({mcqs.length} múltiples y 4 desarrollo).</li>
                  <li>Las alternativas llénalas cuidadosamente al final en tu <strong>Lector Óptico</strong>, sin marcar X.</li>
                  <li>Las preguntas en espacio blanco (abiertas) redáctalas de forma clara y extensa.</li>
                  <li>Tienes 90 minutos para dar lo mejor de ti. Mantén silencio y revisa al terminar.</li>
                </ul>
              </div>
            </div>

            {/* PREGUNTAS ALUMNO */}
            <div className={`page ${cClass}`}>
              <div style={{ borderBottom: '4px solid #0f172a', paddingBottom: '15px', marginBottom: '40px', fontSize: '1.4rem', fontWeight: '900', textTransform: 'uppercase' }}>
                DESARROLLO DE LA EVALUACIÓN
              </div>
              <div className="q-flow">
                {test.map((q) => {
                  return (
                    <div key={q.id} className="q-item">
                      {q.textoLectura && (
                        <div className="reading-box" style={{ breakInside: 'auto' }}>
                          <div className="r-title">LECTURA PRINCIPAL</div>
                          <div className="r-txt">{q.textoLectura}</div>
                        </div>
                      )}

                      <div className="q-head">
                        <span className="q-num">{q.id}.</span>
                        <span className="q-text">{q.enunciado}</span>
                      </div>

                      {q.imageUrl && (
                        <div className="q-img">
                          <img src={q.imageUrl} alt="Ilustración Mineduc" crossOrigin="anonymous" />
                        </div>
                      )}

                      {q.tipo === 'seleccion' ? (
                        <div className="alts">
                          {q.alternativas && q.alternativas.map((alt, i) => {
                            let safeAlt = alt.length > 3 ? alt : `${['A', 'B', 'C', 'D'][i]}) ${alt}`;
                            return (
                              <div key={i} className="alt-row">
                                <span className="alt-let">{safeAlt.substring(0, 2)}</span>
                                {safeAlt.substring(3)}
                              </div>
                            );
                          })}
                        </div>
                      ) : (
                        <div className="dev-box">
                          <div className="dev-inner-lines"></div>
                        </div>
                      )}
                    </div>
                  )
                })}
              </div>
            </div>

            {/* HOJA OMR LECTOR OPTICO */}
            <div className="page" style={{ pageBreakBefore: 'always' }}>
              <div className="cover-header" style={{ borderBottomColor: '#0f172a' }}>
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield /> : <IconMetrenco />} LECTOR DIGITAL</div>
                <div style={{ fontWeight: 'bold', fontSize: '1.2rem', color: '#475569' }}>HOJA DE RESPUESTAS OFICIAL</div>
              </div>
              <div className="student-box" style={{ padding: '1.5rem', borderWidth: '2px' }}>
                <div className="s-row" style={{ marginBottom: 0 }}>Nombre del Estudiante: <div className="s-line" style={{ borderStyle: 'dashed', borderColor: 'black' }}></div></div>
              </div>

              <div className="omr">
                <div className="omr-title">{sjName.toUpperCase()}</div>
                <div style={{ textAlign: 'center', marginBottom: '3rem', fontWeight: 'bold', color: '#334155' }}>Pinte COMPLETAMENTE el círculo interior con lápiz grafito. No marque cruces.</div>

                <div className="omr-grid">
                  {[0, 11, 22].map(colStart => (
                    <div key={colStart} className="omr-col">
                      {mcqs.slice(colStart, colStart + 11).map((q) => {
                        let realID = mcqs.indexOf(q) + 1;
                        return (
                          <div key={q.id} className="o-row">
                            <div className="o-num">{realID}</div>
                            <div className="o-b">A</div><div className="o-b">B</div><div className="o-b">C</div><div className="o-b">D</div>
                          </div>
                        )
                      })}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* DOCUMENTO EXTREMADAMENTE SECRETO PARA DOCENTE */}
            <div className="page pauta-page">
              <div className="pauta-docente-header">
                DOCUMENTO EXCLUSIVO DOCENTE<br />
                <span style={{ fontSize: '1.5rem', fontWeight: '600', color: '#fca5a5' }}>SOLUCIONARIO V7 GEMINI AI</span>
              </div>

              <table className="pauta-table">
                <thead>
                  <tr>
                    <th style={{ width: '50px', textAlign: 'center' }}>Nº</th>
                    <th style={{ width: '150px' }}>EJE EVALUADO</th>
                    <th style={{ width: '100px', textAlign: 'center' }}>TIPO</th>
                    <th>RESPUESTA CLAVE Y/O RÚBRICA</th>
                  </tr>
                </thead>
                <tbody>
                  {test.map((q, idx) => (
                    <tr key={'p' + q.id}>
                      <td style={{ textAlign: 'center', fontWeight: 'bold', fontSize: '1.3rem' }}>{idx + 1}</td>
                      <td style={{ fontWeight: 'bold', color: '#475569' }}>{q.eje}</td>
                      <td style={{ textAlign: 'center' }}>{q.tipo === 'seleccion' ? 'Opción' : 'Abierto'}</td>
                      <td className={q.tipo === 'desarrollo' ? 'sol-dev' : ''}>
                        {q.tipo === 'seleccion' ? (
                          <strong style={{ color: '#2563eb', fontSize: '1.3rem' }}>{q.correcta.substring(0, 2)}</strong>
                        ) : (
                          <div>{q.correcta}</div>
                        )}
                        {q.tipo === 'seleccion' && <span style={{ marginLeft: '0.5rem', color: '#475569' }}>{q.correcta.substring(3)}</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
