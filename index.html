<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMCE Pro con Inteligencia Artificial - Agencia</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* VARIABLES Y TEMAS GLOBALES */
    :root {
      --primary-color: #6366f1; /* Indigo suave */
      --secondary-color: #f43f5e; /* Rose */
      --science-color: #10b981; /* Emerald */
      --ai-color: #8b5cf6; /* Violet */
      --bg-start: #0f172a;
      --bg-end: #020617;
      --text: #f8fafc;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text); min-height: 100vh; }
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
    
    /* DASHBOARD UI */
    .dashboard-wrapper { padding: 3rem; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 3rem; }
    .logo-area { display: flex; align-items: center; gap: 1.5rem; }
    .logo-icon { width: 70px; height: 70px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; background: linear-gradient(135deg, var(--ai-color), var(--primary-color)); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5); }
    .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* API KEY SECTION */
    .api-key-section { padding: 2rem 3rem; background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); display: flex; align-items: center; justify-content: space-between; gap: 2rem; border-radius: 16px; margin-bottom: 1rem; }
    .api-info { flex: 1; }
    .api-info h2 { color: #ddd6fe; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .api-input-group { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .api-input { padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid #6366f1; background: rgba(0,0,0,0.5); color: white; font-size: 1.1rem; width: 100%; outline: none; transition: 0.3s; }
    .api-input:focus { border-color: #a78bfa; box-shadow: 0 0 20px rgba(167, 139, 250, 0.4); }
    .api-link { color: #a78bfa; text-decoration: none; font-size: 0.9rem; margin-top: 0.5rem; display: inline-block; }
    .api-link:hover { text-decoration: underline; }

    .grid-layout { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 2.5rem; }
    .panel-section { display: flex; flex-direction: column; gap: 1.2rem; }
    .panel-section h2 { font-size: 1.4rem; color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.8rem; }
    
    .btn-card { padding: 1.8rem; border-radius: 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; background: rgba(0,0,0,0.3); font-size: 1.2rem; display: flex; align-items: center; gap: 1rem; font-weight: 600; color: #94a3b8; }
    .btn-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); color: white; }
    
    .btn-card.active.truf { border-color: #38bdf8; background: rgba(56, 189, 248, 0.15); color: white; box-shadow: 0 0 25px rgba(56, 189, 248, 0.2); }
    .btn-card.active.met { border-color: #fbbf24; background: rgba(251, 191, 36, 0.15); color: white; box-shadow: 0 0 25px rgba(251, 191, 36, 0.2); }
    .btn-card.active.grade { border-color: var(--text); background: rgba(255, 255, 255, 0.15); color: white; }
    
    .subj-card { text-align: center; flex-direction: column; opacity: 0.4; pointer-events: none; justify-content: center; height: 100%; transition: 0.4s; }
    .subj-card.ena { opacity: 1; pointer-events: auto; }
    .active.lec { border-color: var(--secondary-color); background: rgba(244,63,94,0.15); color: white; box-shadow: 0 0 25px rgba(244,63,94,0.3); transform: scale(1.05); }
    .active.mat { border-color: var(--primary-color); background: rgba(99,102,241,0.15); color: white; box-shadow: 0 0 25px rgba(99,102,241,0.3); transform: scale(1.05); }
    .active.sci { border-color: var(--science-color); background: rgba(16,185,129,0.15); color: white; box-shadow: 0 0 25px rgba(16,185,129,0.3); transform: scale(1.05); }
    
    .generate-wrap { margin-top: 3rem; text-align: center; }
    .gen-btn { font-size: 1.5rem; padding: 1.5rem 4rem; border-radius: 99px; border: none; font-weight: 800; background: #1e293b; color: #64748b; cursor: not-allowed; transition: all 0.4s; display: inline-flex; align-items: center; gap: 1rem; }
    .gen-btn.ready { background: linear-gradient(135deg, var(--ai-color), var(--primary-color)); color: white; cursor: pointer; box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5); }
    .gen-btn.ready:hover { transform: scale(1.05) translateY(-5px); }

    /* LOADING SCREEN */
    .loading-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: white;}
    .spinner { width: 80px; height: 80px; border: 6px solid rgba(139, 92, 246, 0.2); border-top-color: var(--ai-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 2rem; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .load-text { font-size: 1.8rem; font-weight: 800; font-family: 'Outfit'; background: linear-gradient(to right, #a78bfa, #fda4af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; text-align: center;}
    .load-desc { color: #94a3b8; font-size: 1.1rem; max-width: 600px; text-align: center; line-height: 1.6; }

    /* VIEWER Y PDF PRINTING */
    .viewer { background: #f1f5f9; min-height: 100vh; color: #0f172a; display: flex; flex-direction: column; }
    .toolbar { background: #0f172a; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; transition: 0.2s; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .btn-print { background: var(--ai-color); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    .btn-print:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6); }

    .doc-container { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; gap: 3rem; overflow-y: auto; }
    .page { background: white; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 15px solid; position: relative; font-family: 'Arial', sans-serif; border-radius: 8px; }
    .page.lec { border-top-color: var(--secondary-color); }
    .page.mat { border-top-color: var(--primary-color); }
    .page.sci { border-top-color: var(--science-color); }
    
    .pauta-page { border-top-color: #dc2626 !important; position: relative; }
    .pauta-watermark { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.05; font-size: 8rem; font-weight: 900; color: #dc2626; transform: rotate(-45deg); pointer-events: none; }

    .cover-header { display: flex; justify-content: space-between; border-bottom: 4px solid #cbd5e1; padding-bottom: 1.5rem; margin-bottom: 3rem; }
    .school-sig { display: flex; align-items: center; gap: 1rem; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; color: #1e293b;}
    
    .title-area { text-align: center; margin: 4rem 0; }
    .title-area h1 { font-size: 3.5rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -2px; text-transform: uppercase; }
    .title-area h2 { font-size: 2rem; color: #64748b; }
    
    .student-box { border: 3px solid #64748b; border-radius: 12px; padding: 2.5rem; margin-bottom: 3rem; }
    .s-row { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; font-weight: bold; font-size: 1.2rem; }
    .s-line { flex: 1; border-bottom: 2px solid #94a3b8; height: 1.5rem; }
    
    .instruct { background: #f8fafc; padding: 2.5rem; border-left: 8px solid #475569; border-radius: 0 12px 12px 0; }
    .instruct h3 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #0f172a; }
    .instruct li { margin-bottom: 1rem; font-size: 1.2rem; line-height: 1.6; color: #334155; }
    
    .q-flow { display: flex; flex-direction: column; gap: 4rem; }
    .q-item { page-break-inside: avoid; border-bottom: 1px dashed #cbd5e1; padding-bottom: 2rem; }
    .q-item:last-child { border-bottom: none; }
    .q-head { display: flex; gap: 1.5rem; font-size: 1.25rem; color: #0f172a; margin-bottom: 1.5rem; }
    .q-num { font-weight: 900; font-size: 1.5rem; color: #1e293b; min-width: 35px; }
    .q-text { line-height: 1.6; font-weight: 600; }
    
    .q-img { margin: 2rem 0; text-align: center; }
    .q-img img { max-width: 80%; max-height: 350px; border: 2px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); object-fit: contain; }

    .alts { display: flex; flex-direction: column; gap: 1.2rem; padding-left: 3rem; }
    .alt-row { display: flex; gap: 1rem; color: #1e293b; font-size: 1.2rem; line-height: 1.4; align-items: flex-start; }
    .alt-let { font-weight: 900; color: #0f172a; }
    
    .dev-box { margin-left: 3rem; margin-top: 2rem; border: 2px solid #cbd5e1; height: 250px; border-radius: 12px; padding: 1.5rem; background: #fdf8f6; }
    .dev-inner-lines { width: 100%; height: 100%; background-image: repeating-linear-gradient(transparent, transparent 31px, #cbd5e1 31px, #cbd5e1 32px); }

    .reading-box { border: 3px solid #e2e8f0; padding: 3rem; border-radius: 16px; margin-bottom: 3.5rem; background: #fff; box-shadow: inset 0 0 40px rgba(0,0,0,0.02); page-break-inside: auto; }
    .r-title { text-align: center; font-size: 2rem; font-weight: 900; margin-bottom: 2rem; color: #0f172a; }
    .r-txt { font-size: 1.25rem; line-height: 1.9; text-align: justify; color: #1e293b; white-space: pre-wrap; font-family: 'Georgia', serif;}

    /* HOJA DE RESPUESTAS */
    .omr-title { text-align: center; font-size: 2.2rem; font-weight: 900; margin: 3rem 0; letter-spacing: 2px; }
    .omr { border: 3px solid #0f172a; border-radius: 12px; padding: 3rem; margin-top: 3rem; }
    .omr-grid { display: flex; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
    .omr-col { display: flex; flex-direction: column; gap: 1.2rem; }
    .o-row { display: flex; align-items: center; gap: 1.5rem; }
    .o-num { width: 35px; font-weight: 900; font-size: 1.2rem; text-align: right; }
    .o-b { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 2px solid #0f172a; border-radius: 50%; font-size: 0.9rem; font-weight: bold; color: #475569; }

    /* PAUTA DOCENTE */
    .pauta-docente-header { background: #dc2626; color: white; padding: 2rem; text-align: center; font-size: 2rem; font-weight: 900; text-transform: uppercase; border-radius: 12px; margin-bottom: 2rem; }
    .pauta-instructions { font-size: 1.2rem; padding: 1.5rem; background: #fef2f2; border: 2px solid #fca5a5; border-radius: 8px; margin-bottom: 3rem; line-height: 1.6; color: #991b1b; font-weight: 600; }
    
    .pauta-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 1.1rem; }
    .pauta-table th, .pauta-table td { border: 2px solid #cbd5e1; padding: 1rem; text-align: left; }
    .pauta-table th { background: #1e293b; color: white; font-weight: bold; text-transform: uppercase; }
    .pauta-table tr:nth-child(even) { background-color: #f8fafc; }
    .sol-dev { background: #fef3c7 !important; color: #b45309; }
    .key-letter { font-size: 1.5rem; font-weight: 900; color: #2563eb; text-align: center; }

    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .doc-container { padding: 0 !important; gap: 0 !important; }
      .page { box-shadow: none !important; margin: 0 !important; width: 100% !important; border-radius: 0 !important; page-break-after: always; padding: 2cm !important; }
      .page:last-child { page-break-after: auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ICONOS
    const IconShield = () => <span style={{fontSize:'2.5rem'}}>🛡️</span>;
    const IconMetrenco = () => <span style={{fontSize:'2.5rem'}}>🏫</span>;
    const IconKey = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>;

    // ==========================================
    // LLAMADA A LA API DE GOOGLE GEMINI (IA REAL)
    // ==========================================
    const generateTestWithAI = async (apiKey, school, grade, subject) => {
      // Prompt super detallado para obtener respuestas de máxima calidad.
      const prompt = `
ERES LA AGENCIA DE CALIDAD DE LA EDUCACIÓN EN CHILE. Tu rol es crear una prueba oficial SIMCE (Ensayo Nacional V4) para estudiantes de "${grade}" en la asignatura de "${subject}".

REGLAS ESTRICTAS DE PEDAGOGÍA:
1. El ensayo debe contener EXACTAMENTE 35 preguntas reales para niños de esa edad.
2. Ítems del 1 al 31 serán de "seleccion" (múltiple, 4 alternativas).
3. Ítems del 32 al 35 serán de "desarrollo" (preguntas abiertas).
4. El lenguaje tiene que ser dinámico, narrativo, con historias chilenas, nombres típicos y contextos atractivos. NO uses lenguaje de adulto para la pregunta 10. ¡Deben ser creadas AHORA MISMO, sé muy original y variado en las problemáticas!
5. IMÁGENES: Tienes acceso ilimitado a crear imágenes espectaculares usando Pollinations. Si una pregunta matemática, de ciencias o una lectura requiere una ilustración o gráfico, pon el enlace exacto en la variable "imageUrl". 
   - El enlace debe ser de este formato exacto: "https://image.pollinations.ai/prompt/{descripcion_detallada_en_ingles_sin_espacios}?width=600&height=400&nologo=true"
   - Ejemplo: "https://image.pollinations.ai/prompt/simple_bar_chart_for_kids_colorful?width=600&height=400&nologo=true"
   - Si no necesitas imagen pon null. Intenta poner AL MENOS 5 o 6 imágenes maravillosas a lo largo de las 35 preguntas.

ESTRUCTURA DE RESPUESTA EXIGIDA:
Solo puedes responder con un arreglo de JSON en formato texto. ¡SIN delimitadores markdown \`\`\`json, solo empieza con [ y termina con ] !
El JSON debe ser un array de 35 objetos, con esta forma:
[
  {
    "id": 1,
    "tipo": "seleccion", 
    "eje": "El eje curricular chileno oficial que corresponde",
    "textoLectura": "Cuento o lectura completa de media página (Solo inclúyelo en la pregunta donde inicia el texto, luego null en las siguientes).",
    "enunciado": "La fábula cuenta que...",
    "imageUrl": "https://image.pollinations.ai/prompt/illustration_of_a_chilean_fox_in_forest?width=600&height=400&nologo=true",
    "alternativas": ["A) ...", "B) ...", "C) ...", "D) ..."],
    "correcta": "A) ..."
  },
  ...
  {
    "id": 35,
    "tipo": "desarrollo",
    "eje": "Argumentación",
    "textoLectura": null,
    "enunciado": "Imagina que eres parte de...",
    "imageUrl": null,
    "alternativas": [],
    "correcta": "RÚBRICA DOCENTE: El estudiante debe lograr explicar..."
  }
]

VITAL: Revisa bien las comas, no dejes el JSON roto. Devuelve las 35 preguntas con extremada calidad académica. Recuerda que es para ${school}. ¡Sorpréndeme con tu inteligencia creativa!
      `;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.8, maxOutputTokens: 8000 }
          })
        });
        
        if (!response.ok) throw new Error("API Key inválida o error en el servidor de Google");
        
        const jsonRes = await response.json();
        let rawText = jsonRes.candidates[0].content.parts[0].text;
        
        // Limpiar posible formato Markdown de la respuesta LLM
        rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
        
        const testArray = JSON.parse(rawText);
        
        // Verificación básica de longitud, si cortó antes, lo intentaremos rellenar localmente (raro con 8000 tokens)
        if (!testArray || testArray.length < 5) throw new Error("La IA no generó el array correcto");
        
        return testArray;
      } catch (err) {
        console.error(err);
        throw new Error("Fallo en la Inteligencia Artificial. Asegúrate que la API Key sea correcta y que haya red. " + err.message);
      }
    };

    // ==========================================
    // COMPONENTES REACT
    // ==========================================
    const App = () => {
      const [view, setView] = useState('dash');
      const [config, setConfig] = useState({});
      const [testData, setTestData] = useState([]);
      const [apiKey, setApiKey] = useState(localStorage.getItem('simce_api_key') || '');
      const [loading, setLoading] = useState(false);
      const [loadMsg, setLoadMsg] = useState("");

      const handleGenerate = async (school, grade, subject) => {
        if (!apiKey) { alert("¡Necesitas pegar una llave API de Gemini (gratuita) en el casillero superior!"); return; }
        
        localStorage.setItem('simce_api_key', apiKey);
        
        try {
          setLoading(true);
          setLoadMsg("Conectando con Inteligencia Artificial...");
          
          setTimeout(() => setLoadMsg("Analizando Currículum de "+ grade + " Básico..."), 3000);
          setTimeout(() => setLoadMsg("La IA está redactando 35 preguntas únicas (15 seg)..."), 8000);
          setTimeout(() => setLoadMsg("Pintando ilustraciones con redes neuronales..."), 15000);

          const data = await generateTestWithAI(apiKey, school, grade, subject);
          
          setConfig({ school, grade, subject });
          setTestData(data);
          setView('view');
          
        } catch (error) {
          alert("Error: " + error.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div>
          {loading && (
             <div className="loading-overlay">
                <div className="spinner"></div>
                <div className="load-text">{loadMsg}</div>
                <div className="load-desc">Este proceso está creando un contenido educativo completamente nuevo en los servidores de Google. Es gratis e ilimitado.</div>
             </div>
          )}
          {view === 'dash' 
            ? <Dashboard onGen={handleGenerate} apiKey={apiKey} setApiKey={setApiKey} /> 
            : <PdfViewer cfg={config} test={testData} onBack={() => setView('dash')} />
          }
        </div>
      );
    };

    const Dashboard = ({ onGen, apiKey, setApiKey }) => {
      const [sc, setSc] = useState('');
      const [gr, setGr] = useState('');
      const [su, setSu] = useState('');
      const ready = sc && gr && su && apiKey.length > 10;

      return (
        <div className="dashboard-wrapper">
          <div className="header glass-panel">
            <div className="logo-area"><div className="logo-icon"><h2>AI</h2></div> 
            <div><h1>SIMCE Engine AI</h1><p style={{color:'#cbd5e1', fontSize:'1.1rem'}}>Conectado a Modelos Neuronales 2026</p></div></div>
          </div>
          
          <div className="api-key-section glass-panel">
            <div className="api-info">
              <h2><IconKey /> Credencial de Inteligencia Artificial</h2>
              <p style={{color:'#94a3b8', lineHeight:'1.5'}}>Para generar evaluaciones <b>Ilimitadas e Inéditas con Imágenes</b>, el sistema requiere acceso al motor de Google. Pega tu API Key de Gemini aquí. Nunca se guarda en servidores externos.</p>
              <a href="https://aistudio.google.com/app/apikey" target="_blank" className="api-link">Obtén tu API Key gratuita aquí en 2 clics →</a>
            </div>
            <div className="api-input-group">
              <input type="password" placeholder="Ej: AIzaSyAxxxxxxxxxxxx..." className="api-input" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} />
              {apiKey.length > 10 && <span style={{color:'#10b981', fontSize:'0.9rem', fontWeight:'bold'}}>✓ API Configurada</span>}
            </div>
          </div>

          <div className="grid-layout">
            <div className="panel-section">
              <h2>🏢 1. Institución</h2>
              <div className={`btn-card glass-panel ${sc==='Escuela Truf-Truf'?'active truf':''}`} onClick={()=>setSc('Escuela Truf-Truf')}>🛡️ Escuela Truf-Truf</div>
              <div className={`btn-card glass-panel ${sc==='Escuela Metrenco'?'active met':''}`} onClick={()=>setSc('Escuela Metrenco')}>🏫 Escuela Metrenco</div>
            </div>

            <div className="panel-section">
              <h2>🎓 2. Nivel Estudiantil</h2>
              <div className={`btn-card glass-panel ${gr==='4to'?'active grade':''}`} onClick={()=>{setGr('4to'); setSu('');}}>4° Básico</div>
              <div className={`btn-card glass-panel ${gr==='6to'?'active grade':''}`} onClick={()=>{setGr('6to'); setSu('');}}>6° Básico</div>
            </div>

            <div className="panel-section">
              <h2>📚 3. Asignatura a Redactar con IA</h2>
              <div style={{display:'grid', gap:'1.2rem', gridTemplateColumns:'1fr 1fr', height:'100%'}}>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='lectura'?'active lec':''}`} onClick={()=>gr&&setSu('lectura')}>📖 Lectura</div>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='matematica'?'active mat':''}`} onClick={()=>gr&&setSu('matematica')}>🧮 Matemática</div>
                {gr === '6to' && <div className={`btn-card subj-card ena ${su==='ciencias'?'active sci':''}`} style={{gridColumn:'span 2'}} onClick={()=>setSu('ciencias')}>🧬 Ciencias Naturales</div>}
              </div>
            </div>
          </div>

          <div className="generate-wrap">
            <button className={`gen-btn ${ready?'ready':''}`} onClick={() => ready && onGen(sc, gr, su)}>
               ✨ Iniciar Creación de Ensayo con IA
            </button>
          </div>
        </div>
      );
    };

    const PdfViewer = ({ cfg, test, onBack }) => {
      const sjName = cfg.subject === 'lectura' ? 'Lectura' : cfg.subject === 'matematica' ? 'Matemática' : 'Ciencias Naturales';
      const grName = cfg.grade === '4to' ? '4° Básico' : '6° Básico';
      const cClass = cfg.subject === 'lectura' ? 'lec' : cfg.subject === 'matematica' ? 'mat' : 'sci';
      
      const mcqs = test.filter(t => t.tipo === 'seleccion');
      
      return (
        <div className="viewer">
          <div className="toolbar no-print">
             <button className="btn btn-back" onClick={onBack}>← Volver a Plataforma</button>
             <span style={{fontSize:'1.2rem', fontWeight:'bold'}}>✅ {cfg.school} | {grName} | Ensayo Creado Exitosamente por IA</span>
             <button className="btn btn-print" onClick={()=>window.print()}>🖨️ Desplegar e Imprimir PDF Completo</button>
          </div>

          <div className="doc-container">
            {/* 1. PORTADA OFICIAL */}
            <div className={`page ${cClass}`}>
              <div className="cover-header">
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} {cfg.school}</div>
                <div style={{textAlign:'right', color:'#64748b'}}><b>Agencia de Calidad AI</b><br/>Validación 2026</div>
              </div>
              
              <div className="title-area">
                <h1>CUADERNILLO NACIONAL</h1>
                <h2>Prueba de {sjName} - {grName}</h2>
              </div>
              
              <div className="student-box">
                <div className="s-row">Estudiante: <div className="s-line"></div></div>
                <div className="s-row" style={{marginBottom:0}}>
                   <span style={{width:'50%', display:'flex'}}>RUT: <div className="s-line"></div></span>
                   <span style={{width:'50%', display:'flex'}}>Fecha: <div className="s-line"></div></span>
                </div>
              </div>

              <div className="instruct">
                <h3>INSTRUCCIONES OFICIALES</h3>
                <ul>
                  <li>Este cuadernillo es totalmente único y ha sido generado especialmente para evaluar tus conocimientos.</li>
                  <li>Contiene un total de <strong>{test.length} interrogantes.</strong> Las primeras {mcqs.length} son de alternativas.</li>
                  <li>Usa tu <strong>HOJA DE RESPUESTAS</strong> ubicada en la última parte para ennegrecer el círculo correcto de las alternativas.</li>
                  <li>Si encuentras preguntas de desarrollo, responde de la forma más completa y con excelente letra directamente en los recuadros del ensayo.</li>
                  <li>Dispones de 90 minutos para completar toda la evaluación.</li>
                </ul>
              </div>
            </div>

            {/* 2. PAGINAS DE PREGUNTAS REDACTADAS POR IA */}
            <div className={`page ${cClass}`}>
               <div style={{borderBottom:'4px solid #0f172a', paddingBottom:'15px', marginBottom:'40px', fontSize:'1.4rem', fontWeight:'900', textTransform:'uppercase'}}>
                 DESARROLLO DE LA EVALUACIÓN
               </div>
               <div className="q-flow">
                 {test.map((q) => {
                   return (
                     <div key={q.id} className="q-item">
                        
                        {q.textoLectura && (
                          <div className="reading-box">
                             <div className="r-title">TEXTO DE LECTURA ASIGNADO</div>
                             <div className="r-txt">{q.textoLectura}</div>
                          </div>
                        )}

                        <div className="q-head">
                          <span className="q-num">{q.id}.</span> 
                          <span className="q-text">{q.enunciado}</span>
                        </div>
                        
                        {/* IMAGEN DE POLLINATIONS EN TIEMPO REAL */}
                        {q.imageUrl && (
                          <div className="q-img">
                             <img src={q.imageUrl} alt="Ilustración AI" crossOrigin="anonymous" />
                          </div>
                        )}

                        {q.tipo === 'seleccion' ? (
                          <div className="alts">
                            {q.alternativas && q.alternativas.map((alt, i) => {
                              // Asegura formato de letra si la IA manda raro
                              let safeAlt = alt.length > 3 ? alt : `${['A','B','C','D'][i]}) ${alt}`;
                              return (
                                <div key={i} className="alt-row">
                                   <span className="alt-let">{safeAlt.substring(0,2)}</span>
                                   {safeAlt.substring(3)}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="dev-box">
                             <div className="dev-inner-lines"></div>
                          </div>
                        )}
                     </div>
                   )
                 })}
               </div>
            </div>

            {/* 3. HOJA DE RESPUESTAS OMR */}
            <div className="page">
              <div className="cover-header" style={{borderBottomColor:'#0f172a'}}>
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} LECTOR DIGITAL</div>
                <div style={{fontWeight:'bold', fontSize:'1.2rem', color:'#475569'}}>HOJA DE RESPUESTAS OFICIAL</div>
              </div>
              <div className="student-box" style={{padding:'1.5rem', borderWidth:'2px'}}>
                 <div className="s-row" style={{marginBottom:0}}>Nombre: <div className="s-line" style={{borderStyle:'dashed', borderColor:'black'}}></div></div>
              </div>
              
              <div className="omr">
                 <div className="omr-title">{sjName.toUpperCase()}</div>
                 <div style={{textAlign:'center', marginBottom:'3rem', fontWeight:'bold', color:'#334155'}}>Pinte COMPLETAMENTE el círculo interior. No use 'X' ni 'V'.</div>
                 
                 <div className="omr-grid">
                    {[0, 11, 22].map(colStart => (
                      <div key={colStart} className="omr-col">
                        {mcqs.slice(colStart, colStart+11).map((q) => {
                           let realID = mcqs.indexOf(q) + 1;
                           return (
                             <div key={q.id} className="o-row">
                               <div className="o-num">{realID}</div>
                               <div className="o-b">A</div><div className="o-b">B</div><div className="o-b">C</div><div className="o-b">D</div>
                             </div>
                           )
                        })}
                      </div>
                    ))}
                 </div>
              </div>
            </div>

            {/* 4. DOCUMENTO EXCLUSIVO DOCENTE - SOLUCIONARIO OFICIAL */}
            <div className="page pauta-page">
               <div className="pauta-watermark">CONFIDENCIAL</div>
               <div className="pauta-docente-header">
                 DOCUMENTO EXCLUSIVO DOCENTE<br/>
                 <span style={{fontSize:'1.5rem', fontWeight:'600', color:'#fca5a5'}}>SOLUCIONARIO OFICIAL DEL ENSAYO</span>
               </div>
               
               <div className="pauta-instructions">
                 Estimado profesor(a): Este documento fue generado por la Red Neuronal de Google en tiempo real. 
                 Contiene la <strong>clave de corrección exacta</strong> para el Cuadernillo de {sjName} que se acaba de descargar arriba, permitiendo medir los ejes oficiales especificados en la columna derecha.
                 <br/><br/>
                 Por favor, retire esta última página cuando entregue las impresiones a los estudiantes.
               </div>
               
               <table className="pauta-table">
                  <thead>
                    <tr>
                      <th style={{width:'50px', textAlign:'center'}}>Nº</th>
                      <th style={{width:'150px'}}>EJE EVALUADO</th>
                      <th style={{width:'100px', textAlign:'center'}}>TIPO</th>
                      <th>RESPUESTA Y RÚBRICA ESPERADA</th>
                    </tr>
                  </thead>
                  <tbody>
                    {test.map((q, idx) => (
                      <tr key={'p'+q.id}>
                        <td style={{textAlign:'center', fontWeight:'bold', fontSize:'1.3rem'}}>{idx+1}</td>
                        <td style={{fontWeight:'bold', color:'#475569'}}>{q.eje}</td>
                        <td style={{textAlign:'center'}}>{q.tipo === 'seleccion' ? 'Opción' : 'Desarrollo'}</td>
                        <td className={q.tipo === 'desarrollo' ? 'sol-dev' : ''}>
                           {q.tipo === 'seleccion' ? (
                             <div className="key-letter">{q.correcta}</div>
                           ) : (
                             <div>{q.correcta}</div>
                           )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
               </table>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
