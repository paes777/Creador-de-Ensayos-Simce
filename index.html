<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMCE Pro - IA Abierta & Nativa</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* VARIABLES Y TEMAS GLOBALES */
    :root {
      --primary-color: #3b82f6; 
      --secondary-color: #f43f5e; 
      --science-color: #10b981; 
      --ai-color: #8b5cf6;
      --bg-start: #0f172a;
      --bg-end: #020617;
      --text: #f8fafc;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
    
    /* DASHBOARD UI */
    .dashboard-wrapper { padding: 3rem; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 3rem; }
    .logo-area { display: flex; align-items: center; gap: 1.5rem; }
    .logo-icon { width: 75px; height: 75px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; background: linear-gradient(135deg, var(--ai-color), var(--primary-color)); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); }
    .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* INFORMATIVO RED ABIERTA LAYER */
    .network-badge { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); padding: 1.2rem 2rem; border-radius: 12px; display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; }
    .pulse-dot { width: 12px; height: 12px; background: #10b981; border-radius: 50%; box-shadow: 0 0 15px #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    .network-text h3 { color: #34d399; margin-bottom: 0.3rem; }
    .network-text p { color: #94a3b8; font-size: 0.95rem; line-height: 1.5;}

    .grid-layout { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 2.5rem; }
    .panel-section { display: flex; flex-direction: column; gap: 1.2rem; }
    .panel-section h2 { font-size: 1.4rem; color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.8rem; }
    
    .btn-card { padding: 1.8rem; border-radius: 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; background: rgba(0,0,0,0.3); font-size: 1.2rem; display: flex; align-items: center; gap: 1rem; font-weight: 600; color: #94a3b8; }
    .btn-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); color: white; }
    
    .btn-card.active.truf { border-color: #38bdf8; background: rgba(56, 189, 248, 0.15); color: white; box-shadow: 0 0 25px rgba(56, 189, 248, 0.2); }
    .btn-card.active.met { border-color: #fbbf24; background: rgba(251, 191, 36, 0.15); color: white; box-shadow: 0 0 25px rgba(251, 191, 36, 0.2); }
    .btn-card.active.grade { border-color: var(--text); background: rgba(255, 255, 255, 0.15); color: white; }
    
    .subj-card { text-align: center; flex-direction: column; opacity: 0.4; pointer-events: none; justify-content: center; height: 100%; transition: 0.4s; }
    .subj-card.ena { opacity: 1; pointer-events: auto; }
    .active.lec { border-color: var(--secondary-color); background: rgba(244,63,94,0.15); color: white; box-shadow: 0 0 25px rgba(244,63,94,0.3); transform: scale(1.02); }
    .active.mat { border-color: var(--primary-color); background: rgba(59,130,246,0.15); color: white; box-shadow: 0 0 25px rgba(59,130,246,0.3); transform: scale(1.02); }
    .active.sci { border-color: var(--science-color); background: rgba(16,185,129,0.15); color: white; box-shadow: 0 0 25px rgba(16,185,129,0.3); transform: scale(1.02); }
    
    .generate-wrap { margin-top: 3rem; text-align: center; }
    .gen-btn { font-size: 1.5rem; padding: 1.5rem 4rem; border-radius: 99px; border: none; font-weight: 800; background: #1e293b; color: #64748b; cursor: not-allowed; transition: all 0.4s; display: inline-flex; align-items: center; gap: 1rem; }
    .gen-btn.ready { background: linear-gradient(135deg, var(--ai-color), var(--primary-color)); color: white; cursor: pointer; box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5); }
    .gen-btn.ready:hover { transform: scale(1.05) translateY(-5px); }

    /* LOADING NATIVO */
    .loading-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: white;}
    .cube-grid { width: 60px; height: 60px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 2rem;}
    .cube { background-color: var(--ai-color); animation: scale 1.5s infinite ease-in-out; }
    .cube:nth-child(1) { animation-delay: 0.2s; } .cube:nth-child(2) { animation-delay: 0.3s; } .cube:nth-child(3) { animation-delay: 0.4s; }
    .cube:nth-child(4) { animation-delay: 0.1s; } .cube:nth-child(5) { animation-delay: 0.2s; } .cube:nth-child(6) { animation-delay: 0.3s; }
    .cube:nth-child(7) { animation-delay: 0.0s; } .cube:nth-child(8) { animation-delay: 0.1s; } .cube:nth-child(9) { animation-delay: 0.2s; }
    @keyframes scale { 0%, 70%, 100% { transform: scale3D(1, 1, 1); } 35% { transform: scale3D(0, 0, 1); } }
    
    .load-text { font-size: 1.8rem; font-weight: 800; font-family: 'Outfit'; background: linear-gradient(to right, #93c5fd, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; text-align: center;}
    .load-status { color: #10b981; font-weight: bold; margin-bottom: 1rem; font-size: 1.1rem;}
    .prog-bar { width: 300px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--ai-color), var(--science-color)); transition: width 0.3s linear; }

    /* PDF VIEWER ESTILO SIMCE */
    .viewer { background: #f1f5f9; min-height: 100vh; color: #0f172a; display: flex; flex-direction: column; }
    .toolbar { background: #0f172a; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; transition: 0.2s; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .btn-print { background: var(--ai-color); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    .btn-print:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6); }

    .doc-container { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; gap: 3rem; overflow-y: auto; }
    .page { background: white; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 15px solid; position: relative; font-family: 'Arial', sans-serif; border-radius: 8px; }
    .page.lec { border-top-color: var(--secondary-color); }
    .page.mat { border-top-color: var(--primary-color); }
    .page.sci { border-top-color: var(--science-color); }
    
    .pauta-page { border-top-color: #dc2626 !important; position: relative; }
    .pauta-watermark { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.05; font-size: 8rem; font-weight: 900; color: #dc2626; transform: rotate(-45deg); pointer-events: none; }

    .cover-header { display: flex; justify-content: space-between; border-bottom: 4px solid #cbd5e1; padding-bottom: 1.5rem; margin-bottom: 3rem; }
    .school-sig { display: flex; align-items: center; gap: 1rem; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; color: #1e293b;}
    
    .title-area { text-align: center; margin: 4rem 0; }
    .title-area h1 { font-size: 3.5rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -2px; text-transform: uppercase; }
    .title-area h2 { font-size: 2rem; color: #64748b; }
    
    .student-box { border: 3px solid #64748b; border-radius: 12px; padding: 2.5rem; margin-bottom: 3rem; }
    .s-row { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; font-weight: bold; font-size: 1.2rem; }
    .s-line { flex: 1; border-bottom: 2px solid #94a3b8; height: 1.5rem; }
    
    .instruct { background: #f8fafc; padding: 2.5rem; border-left: 8px solid #475569; border-radius: 0 12px 12px 0; }
    .instruct h3 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #0f172a; }
    .instruct li { margin-bottom: 1rem; font-size: 1.2rem; line-height: 1.6; color: #334155; }
    
    .q-flow { display: flex; flex-direction: column; gap: 4rem; }
    .q-item { page-break-inside: avoid; border-bottom: 1px dashed #cbd5e1; padding-bottom: 2rem; }
    .q-item:last-child { border-bottom: none; }
    .q-head { display: flex; gap: 1.5rem; font-size: 1.25rem; color: #0f172a; margin-bottom: 1.5rem; }
    .q-num { font-weight: 900; font-size: 1.5rem; color: #1e293b; min-width: 35px; }
    .q-text { line-height: 1.6; font-weight: 600; }
    
    .q-img { margin: 2rem 0; text-align: center;}
    .q-img img { max-width: 80%; max-height: 350px; border: 2px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); object-fit: contain; }

    .alts { display: flex; flex-direction: column; gap: 1.2rem; padding-left: 3rem; }
    .alt-row { display: flex; gap: 1rem; color: #1e293b; font-size: 1.2rem; line-height: 1.4; align-items: flex-start; }
    .alt-let { font-weight: 900; color: #0f172a; }
    
    .dev-box { margin-left: 3rem; margin-top: 2rem; border: 2px solid #cbd5e1; height: 250px; border-radius: 12px; padding: 1.5rem; background: #fdf8f6; }
    .dev-inner-lines { width: 100%; height: 100%; background-image: repeating-linear-gradient(transparent, transparent 31px, #cbd5e1 31px, #cbd5e1 32px); }

    .reading-box { border: 3px solid #e2e8f0; padding: 3rem; border-radius: 16px; margin-bottom: 3.5rem; background: #fff; box-shadow: inset 0 0 40px rgba(0,0,0,0.02); page-break-inside: auto; }
    .r-title { text-align: center; font-size: 2rem; font-weight: 900; margin-bottom: 2rem; color: #0f172a; border-bottom: 2px dotted #cbd5e1; padding-bottom: 1rem;}
    .r-txt { font-size: 1.25rem; line-height: 1.9; text-align: justify; color: #1e293b; white-space: pre-wrap; font-family: 'Georgia', serif;}

    /* OMR Y SOLUCIONARIO */
    .omr-title { text-align: center; font-size: 2.2rem; font-weight: 900; margin: 3rem 0; letter-spacing: 2px; }
    .omr { border: 3px solid #0f172a; border-radius: 12px; padding: 3rem; margin-top: 3rem; }
    .omr-grid { display: flex; justify-content: space-around; gap: 2rem; flex-wrap: wrap; }
    .omr-col { display: flex; flex-direction: column; gap: 1.2rem; }
    .o-row { display: flex; align-items: center; gap: 1.5rem; }
    .o-num { width: 35px; font-weight: 900; font-size: 1.2rem; text-align: right; }
    .o-b { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 2px solid #0f172a; border-radius: 50%; font-size: 0.9rem; font-weight: bold; color: #475569; }

    .pauta-docente-header { background: #dc2626; color: white; padding: 2rem; text-align: center; font-size: 2rem; font-weight: 900; text-transform: uppercase; border-radius: 12px; margin-bottom: 2rem; }
    .pauta-instructions { font-size: 1.2rem; padding: 1.5rem; background: #fef2f2; border: 2px solid #fca5a5; border-radius: 8px; margin-bottom: 3rem; line-height: 1.6; color: #991b1b; font-weight: 600; }
    
    .pauta-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 1.1rem; }
    .pauta-table th, .pauta-table td { border: 2px solid #cbd5e1; padding: 1rem; text-align: left; }
    .pauta-table th { background: #1e293b; color: white; font-weight: bold; text-transform: uppercase; }
    .pauta-table tr:nth-child(even) { background-color: #f8fafc; }
    .sol-dev { background: #fef3c7 !important; color: #b45309; }
    .key-letter { font-size: 1.5rem; font-weight: 900; color: #2563eb; text-align: center; }

    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .doc-container { padding: 0 !important; gap: 0 !important; }
      .page { box-shadow: none !important; margin: 0 !important; width: 100% !important; border-radius: 0 !important; page-break-after: always; padding: 2cm !important; }
      .page:last-child { page-break-after: auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const IconShield = () => <span style={{fontSize:'2.5rem'}}>🛡️</span>;
    const IconMetrenco = () => <span style={{fontSize:'2.5rem'}}>🏫</span>;

    // ==========================================
    // IA NATIVA ABIERTA + CEREBRO LOCAL ANTI-FALLOS (MULTIHILO)
    // ==========================================

    // Diccionarios de palabras para hacer el generador nativo "humano" y hermoso.
    const names = ["Pedro", "Javiera", "Diego", "Constanza", "Martín", "Antonia", "Joaquín", "Isidora", "Matías", "Valentina", "Sebastián"];
    const towns = ["Villarrica", "Temuco", "Pucón", "Valdivia", "Castro", "Frutillar", "Puerto Varas", "Quellón", "La Serena"];
    const objectsMath = ["lápices", "manzanas", "juguetes", "láminas del álbum", "metros de tela", "gramos de harina", "kilómetros"];
    const contexts = ["en la feria municipal", "durante el campamento escolar", "en la cordillera", "en el mercado", "ayudando a la abuela", "en la excursión del curso"];

    const randC = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const randN = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

    // CEREBRO DE RESPALDO: Crea preguntas humanizadas con imágenes si la red AI falla
    const generateFallbackQuestion = (id, grade, subject, isDesarrollo = false) => {
      let q = { id, tipo: isDesarrollo ? 'desarrollo' : 'seleccion', eje: 'Análisis', textoLectura: null, enunciado: "", imageUrl: null, alternativas: [], correcta: "" };
      
      const nName = randC(names); 
      const nTown = randC(towns);

      if (subject === 'matematica') {
        q.eje = randC(['Números', 'Álgebra', 'Geometría']);
        let a = randN(100, 900); let b = randN(10, 99);
        q.enunciado = `${nName} vive en ${nTown} y compró ${a} ${randC(objectsMath)} ${randC(contexts)}. Luego, decidió regalarle ${b} a su mejor amigo. ¿Cuántos le quedaron en total para llevar a la casa?`;
        let ans = a - b;
        q.imageUrl = `https://image.pollinations.ai/prompt/cheerful_child_with_${a}_apples_chile_countryside_watercolor_style?width=600&height=300&nologo=true`;
        
        let alts = [ans, ans+10, ans-b, ans+b];
        alts = shuffleArray(alts);
        q.alternativas = alts.map((v, i) => `${['A','B','C','D'][i]}) ${v}`);
        q.correcta = `${['A','B','C','D'][alts.indexOf(ans)]}) ${ans}`;

        if (isDesarrollo) {
            q.enunciado = `Si ${nName} decide no restar, sino multiplicar ${a} por 0, ¿qué resultado obtendría? Explica paso a paso con tus palabras por qué ocurre esto en las matemáticas reales.`;
            q.correcta = "RÚBRICA DOCENTE: El estudiante debe argumentar la propiedad absorbente del cero con palabras claras.";
        }
      } 
      else if (subject === 'ciencias') {
        q.eje = randC(['Biología', 'Física', 'Tierra y Universo']);
        q.enunciado = `Durante una salida al huerto de la escuela en ${nTown}, ${nName} observa que las hojas de los árboles están volviéndose amarillas. Considerando las necesidades de las plantas para hacer fotosíntesis, ¿cuál es el factor ambiental más probable que esté fallando?`;
        let ans = "Falta de luz solar adecuada.";
        let errs = ["Exceso de azúcar temporal.", "Los pájaros se comieron la clorofila.", "La tierra es demasiado blanda."];
        q.imageUrl = `https://image.pollinations.ai/prompt/yellow_leaves_on_tree_autumn_chile_forest_illustration_book?width=600&height=300&nologo=true`;
        
        let shuf = shuffleArray([ans, ...errs]);
        q.alternativas = shuf.map((v, i) => `${['A','B','C','D'][i]}) ${v}`);
        q.correcta = `${['A','B','C','D'][shuf.indexOf(ans)]}) ${ans}`;

        if (isDesarrollo) {
            q.enunciado = `Observando las estrellas, reflexiona: ¿Por qué la luna parece cambiar de forma cada semana? Escribe una justificación científica detallada basada en los movimientos de nuestro sistema solar.`;
            q.correcta = "RÚBRICA DOCENTE: Explicar las fases lunares por el movimiento de traslación alrededor de la tierra e iluminación solar.";
        }
      }
      else { // LECTURA
        q.eje = randC(['Localizar', 'Inferir', 'Reflexionar']);
        let animal = randC(['Pudú', 'Cóndor', 'Zorro Culpeo']);
        if(id % 4 === 1 && !isDesarrollo) {
            q.textoLectura = `Había una vez un ${animal} llamado ${nName} que vivía en los densos bosques cercanos a ${nTown}. A diferencia de los demás animales de su manada, ${nName} poseía una habilidad extraordinaria que asombraba a todos: podía interpretar el susurro de la lluvia y predecir cuándo vendrían las crecidas de los ríos. Una noche fría y oscura, una inmensa tormenta comenzó a azotar los cerros. Los animales, asustados y confundidos, no sabían hacia dónde correr. Entonces, el sabio ${animal} se adelantó...`;
        }
        q.enunciado = `De acuerdo con la historia de ${nName}, ¿cuál fue la razón principal por la que los demás animales confiaban en esta criatura en momentos de adversidad?`;
        let ans = `Porque podía predecir el peligro analizando la lluvia.`;
        let shuf = shuffleArray([ans, "Porque era el líder físico del grupo.", "Porque construyó un refugio gigante.", "Porque tenía magia heredada."]);
        q.imageUrl = `https://image.pollinations.ai/prompt/beautiful_chilean_${animal}_in_forest_rain_children_book_art?width=600&height=300&nologo=true`;
        q.alternativas = shuf.map((v, i) => `${['A','B','C','D'][i]}) ${v}`);
        q.correcta = `${['A','B','C','D'][shuf.indexOf(ans)]}) ${ans}`;

        if (isDesarrollo) {
           q.enunciado = `Reflexiona sobre cómo el protagonista salva a la manada. Escribe con tus palabras: ¿De qué manera escuchar la naturaleza puede ayudarnos hoy en el mundo real? Formula una opinión de 3 líneas.`;
           q.correcta = "RÚBRICA DOCENTE: Argumentar valoración y cuidado de la naturaleza / ecología y desastres.";
        }
      }
      return q;
    };

    const buildFallbackBank = (grade, subject) => {
        let bank = [];
        for(let i=1; i<=31; i++) bank.push(generateFallbackQuestion(i, grade, subject, false));
        for(let i=32; i<=35; i++) bank.push(generateFallbackQuestion(i, grade, subject, true));
        return bank;
    };

    // MOTOR API ABIERTO (POLLINATIONS) TIPO MULTI-HILO (Asíncrono)
    const fetchAIPool = async (grade, subject, startIndex, endIndex, isDesarrollo, delayMs) => {
      // Retrasar para no saturar el host si es req concurrente
      await new Promise(r => setTimeout(r, delayMs));

      const prompt = `Genera ${endIndex - startIndex + 1} preguntas SIMCE (ID del ${startIndex} al ${endIndex}) para alumnos chilenos de ${grade} sobre ${subject}.
Formato EXIGIDO: Solamente un arreglo JSON puro de objetos. SIN CÓDIGO MARKDOWN NI COMILLAS INICIALES.
\`\`\`json
[
  { "id": ${startIndex}, "tipo": "${isDesarrollo ? 'desarrollo' : 'seleccion'}", "eje": "Tema", "enunciado": "...", "imageUrl": "https://image.pollinations.ai/prompt/un_perro_chileno_pintura_ninos_sin_letras?width=500&height=300&nologo=true", "alternativas": ["A) ", "B) ", "C) ", "D) "], "correcta": "A) ..." }
]
\`\`\`
Trata de ser natural y pedagógico. Agrega imágenes de ilustracion infantil por favor usando URLS de image.pollinations.ai/prompt/ .
SOLO responde con el corchete inicial y final del array.`;

      try {
          const res = await fetch('https://text.pollinations.ai/', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                  messages: [
                      { role: 'system', content: 'You are an API that returns exclusively valid JSON arrays.' },
                      { role: 'user', content: prompt }
                  ],
                  model: "mistral" // Usar modelo eficiente
              })
          });
          if (!res.ok) throw new Error("Network fallida");
          let data = await res.text();
          data = data.replace(/```json/gi, '').replace(/```/g, '').trim();
          let parsed = JSON.parse(data);
          return Array.isArray(parsed) ? parsed : [];
      } catch (err) {
          console.warn("Pollinations falló, inyectando hilo local de respaldo...", err);
          // Si el hilo falló, construimos localmente ese segmento exacto.
          let localChunk = [];
          for (let i = startIndex; i <= endIndex; i++) {
              localChunk.push(generateFallbackQuestion(i, grade, subject, isDesarrollo));
          }
          return localChunk;
      }
    };

    // ==========================================
    // COMPONENTES REACT FRONTEND
    // ==========================================
    const App = () => {
      const [view, setView] = useState('dash');
      const [config, setConfig] = useState({});
      const [testData, setTestData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState(0);

      const handleGenerate = async (school, grade, subject) => {
        setLoading(true);
        setProgress(10);
        
        try {
          console.log("Iniciando Clúster Multihilo IA...");
          // Disparamos 5 HILOS SIMULTÁNEOS para forjar 35 preguntas sin timeout ni colapso.
          // Hilo 1: 1 a 7 (Múltiple)
          // Hilo 2: 8 a 14
          // Hilo 3: 15 a 21
          // Hilo 4: 22 a 31
          // Hilo 5: 32 a 35 (Desarrollo)
          
          setProgress(30);
          const p1 = fetchAIPool(grade, subject, 1, 7, false, 0);
          const p2 = fetchAIPool(grade, subject, 8, 14, false, 500);
          const p3 = fetchAIPool(grade, subject, 15, 21, false, 1000);
          const p4 = fetchAIPool(grade, subject, 22, 31, false, 1500);
          const p5 = fetchAIPool(grade, subject, 32, 35, true, 2000);

          let chunks = [];
          
          try {
             const results = await Promise.all([p1, p2, p3, p4, p5]);
             setProgress(80);
             results.forEach(arr => chunks = chunks.concat(arr));
          } catch(err) {
             console.error("Cluster colapsó, entrando en modo NATIVO TOTAL");
             chunks = buildFallbackBank(grade, subject);
          }

          // Validación de salud. Si las IA enviaron menos de 35, parchamos con Cerebro Local.
          let finalTest = [];
          for(let i=1; i<=35; i++) {
              let qFound = chunks.find(c => c && c.id == i);
              if (qFound) finalTest.push(qFound);
              else finalTest.push(generateFallbackQuestion(i, grade, subject, i >= 32));
          }

          setProgress(100);
          setConfig({ school, grade, subject });
          setTestData(finalTest);
          
          setTimeout(() => { setLoading(false); setView('view'); }, 500);
          
        } catch (error) {
          alert("Error crítico. Pero la App debería solucionarlo con Native Brain. Reinicie.");
          setLoading(false);
        }
      };

      return (
        <div>
          {loading && (
             <div className="loading-overlay">
                <div className="cube-grid">
                  {[...Array(9)].map((_, i) => <div key={i} className="cube"></div>)}
                </div>
                <div className="load-text">Motor Multihilo Asíncrono Trabajando</div>
                <div className="load-status">Ensamblando preguntas de manera local y en red abierta ({progress}%)</div>
                <div className="prog-bar"><div className="prog-fill" style={{width: `${progress}%`}}></div></div>
                <div style={{color:'#64748b', marginTop:'2rem', maxWidth:'500px', textAlign:'center'}}>El sistema está forjando nuevas neuronas evaluativas y construyendo ilustraciones a color...</div>
             </div>
          )}
          {view === 'dash' 
            ? <Dashboard onGen={handleGenerate} /> 
            : <PdfViewer cfg={config} test={testData} onBack={() => setView('dash')} />
          }
        </div>
      );
    };

    const Dashboard = ({ onGen }) => {
      const [sc, setSc] = useState('');
      const [gr, setGr] = useState('');
      const [su, setSu] = useState('');
      const ready = sc && gr && su;

      return (
        <div className="dashboard-wrapper">
          <div className="header glass-panel">
            <div className="logo-area"><div className="logo-icon"><h2>NA</h2></div> 
            <div><h1>SIMCE Nativo Ilimitado</h1><p style={{color:'#cbd5e1', fontSize:'1.1rem'}}>Sin claves. Sin registro. 100% Accesible.</p></div></div>
          </div>
          
          <div className="network-badge">
             <div className="pulse-dot"></div>
             <div className="network-text">
                <h3>Red Híbrida Activa</h3>
                <p>El sistema se ha actualizado a la V5. Ahora emplea una red inteligente pública (Zero-Key) apoyada por un Cerebro Matemático Local. ¡Comparte este enlace a cualquier profesor y funcionará al instante gratis!</p>
             </div>
          </div>

          <div className="grid-layout">
            <div className="panel-section">
              <h2>🏢 1. Seleccionar Institución</h2>
              <div className={`btn-card glass-panel ${sc==='Escuela Truf-Truf'?'active truf':''}`} onClick={()=>setSc('Escuela Truf-Truf')}>🛡️ Escuela Truf-Truf</div>
              <div className={`btn-card glass-panel ${sc==='Escuela Metrenco'?'active met':''}`} onClick={()=>setSc('Escuela Metrenco')}>🏫 Escuela Metrenco</div>
            </div>

            <div className="panel-section">
              <h2>🎓 2. Asignar Nivel</h2>
              <div className={`btn-card glass-panel ${gr==='4to'?'active grade':''}`} onClick={()=>{setGr('4to'); setSu('');}}>4° Básico</div>
              <div className={`btn-card glass-panel ${gr==='6to'?'active grade':''}`} onClick={()=>{setGr('6to'); setSu('');}}>6° Básico</div>
            </div>

            <div className="panel-section">
              <h2>📚 3. Inteligencia y Materia</h2>
              <div style={{display:'grid', gap:'1.2rem', gridTemplateColumns:'1fr 1fr', height:'100%'}}>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='lectura'?'active lec':''}`} onClick={()=>gr&&setSu('lectura')}>📖 Lectura</div>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='matematica'?'active mat':''}`} onClick={()=>gr&&setSu('matematica')}>🧮 Matemática</div>
                {gr === '6to' && <div className={`btn-card subj-card ena ${su==='ciencias'?'active sci':''}`} style={{gridColumn:'span 2'}} onClick={()=>setSu('ciencias')}>🧬 Ciencias Naturales</div>}
              </div>
            </div>
          </div>

          <div className="generate-wrap">
            <button className={`gen-btn ${ready?'ready':''}`} onClick={() => ready && onGen(sc, gr, su)}>
               ✨ Ensamblar Prueba Científica Ilimitada
            </button>
          </div>
        </div>
      );
    };

    const PdfViewer = ({ cfg, test, onBack }) => {
      const sjName = cfg.subject === 'lectura' ? 'Lectura' : cfg.subject === 'matematica' ? 'Matemática' : 'Ciencias Naturales';
      const grName = cfg.grade === '4to' ? '4° Básico' : '6° Básico';
      const cClass = cfg.subject === 'lectura' ? 'lec' : cfg.subject === 'matematica' ? 'mat' : 'sci';
      
      const mcqs = test.filter(t => t.tipo === 'seleccion');
      
      return (
        <div className="viewer">
          <div className="toolbar no-print">
             <button className="btn btn-back" onClick={onBack}>← Crear Otra Prueba</button>
             <span style={{fontSize:'1.2rem', fontWeight:'bold'}}>✅ {cfg.school} | Renderizado Completo</span>
             <button className="btn btn-print" onClick={()=>window.print()}>🖨️ Desplegar e Imprimir Todo en A4</button>
          </div>

          <div className="doc-container">
            {/* PORTADA ALUMNO */}
            <div className={`page ${cClass}`}>
              <div className="cover-header">
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} {cfg.school}</div>
                <div style={{textAlign:'right', color:'#64748b'}}><b>Evaluación Nacional</b><br/>Modelo Híbrido 2026</div>
              </div>
              
              <div className="title-area">
                <h1>CUADERNILLO NACIONAL</h1>
                <h2>Prueba de {sjName} - {grName}</h2>
              </div>
              
              <div className="student-box">
                <div className="s-row">Estudiante: <div className="s-line"></div></div>
                <div className="s-row" style={{marginBottom:0}}>
                   <span style={{width:'50%', display:'flex'}}>RUT: <div className="s-line"></div></span>
                   <span style={{width:'50%', display:'flex'}}>Fecha: <div className="s-line"></div></span>
                </div>
              </div>

              <div className="instruct">
                <h3>INSTRUCCIONES DE DESARROLLO</h3>
                <ul>
                  <li>Cuadernillo personalizado con <strong>{test.length} preguntas</strong> ({mcqs.length} múltiples y 4 desarrollo).</li>
                  <li>Las alternativas llénalas cuidadosamente al final en tu <strong>Lector Óptico</strong>.</li>
                  <li>Las preguntas en espacio blanco (abiertas) justifícalas con argumentos sólidos directamente en la prueba.</li>
                  <li>Tienes 90 minutos para dar lo mejor de ti.</li>
                </ul>
              </div>
            </div>

            {/* PREGUNTAS ALUMNO */}
            <div className={`page ${cClass}`}>
               <div style={{borderBottom:'4px solid #0f172a', paddingBottom:'15px', marginBottom:'40px', fontSize:'1.4rem', fontWeight:'900', textTransform:'uppercase'}}>
                 DESARROLLO DE LA EVALUACIÓN
               </div>
               <div className="q-flow">
                 {test.map((q) => {
                   return (
                     <div key={q.id} className="q-item">
                        {q.textoLectura && (
                          <div className="reading-box">
                             <div className="r-title">LECTURA PRINCIPAL</div>
                             <div className="r-txt">{q.textoLectura}</div>
                          </div>
                        )}

                        <div className="q-head">
                          <span className="q-num">{q.id}.</span> 
                          <span className="q-text">{q.enunciado}</span>
                        </div>
                        
                        {q.imageUrl && (
                          <div className="q-img">
                             <img src={q.imageUrl} alt="Ilustración Apoyo" crossOrigin="anonymous" />
                          </div>
                        )}

                        {q.tipo === 'seleccion' ? (
                          <div className="alts">
                            {q.alternativas && q.alternativas.map((alt, i) => {
                              let safeAlt = alt.length > 3 ? alt : `${['A','B','C','D'][i]}) ${alt}`;
                              return (
                                <div key={i} className="alt-row">
                                   <span className="alt-let">{safeAlt.substring(0,2)}</span>
                                   {safeAlt.substring(3)}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="dev-box">
                             <div className="dev-inner-lines"></div>
                          </div>
                        )}
                     </div>
                   )
                 })}
               </div>
            </div>

            {/* HOJA OMR LECTOR OPTICO */}
            <div className="page">
              <div className="cover-header" style={{borderBottomColor:'#0f172a'}}>
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} LECTOR DIGITAL</div>
                <div style={{fontWeight:'bold', fontSize:'1.2rem', color:'#475569'}}>HOJA DE RESPUESTAS OFICIAL</div>
              </div>
              <div className="student-box" style={{padding:'1.5rem', borderWidth:'2px'}}>
                 <div className="s-row" style={{marginBottom:0}}>Nombre del Estudiante: <div className="s-line" style={{borderStyle:'dashed', borderColor:'black'}}></div></div>
              </div>
              
              <div className="omr">
                 <div className="omr-title">{sjName.toUpperCase()}</div>
                 <div style={{textAlign:'center', marginBottom:'3rem', fontWeight:'bold', color:'#334155'}}>Pinte COMPLETAMENTE el círculo interior con lápiz grafito. No marque cruces.</div>
                 
                 <div className="omr-grid">
                    {[0, 11, 22].map(colStart => (
                      <div key={colStart} className="omr-col">
                        {mcqs.slice(colStart, colStart+11).map((q) => {
                           let realID = mcqs.indexOf(q) + 1;
                           return (
                             <div key={q.id} className="o-row">
                               <div className="o-num">{realID}</div>
                               <div className="o-b">A</div><div className="o-b">B</div><div className="o-b">C</div><div className="o-b">D</div>
                             </div>
                           )
                        })}
                      </div>
                    ))}
                 </div>
              </div>
            </div>

            {/* DOCUMENTO EXTREMADAMENTE SECRETO PARA DOCENTE */}
            <div className="page pauta-page">
               <div className="pauta-watermark">CONFIDENCIAL</div>
               <div className="pauta-docente-header">
                 DOCUMENTO EXCLUSIVO DOCENTE<br/>
                 <span style={{fontSize:'1.5rem', fontWeight:'600', color:'#fca5a5'}}>SOLUCIONARIO EJE TRANSVERSAL</span>
               </div>
               
               <div className="pauta-instructions">
                 Estimado profesor(a): Este solucionario incluye la validación de <strong>respuestas cerradas</strong> y la <strong>rúbrica</strong> esperada para preguntas abiertas generadas en esta ejecución híbrida única. Es vital desprender esta hoja antes de presentar el cuadernillo al alumnado.
               </div>
               
               <table className="pauta-table">
                  <thead>
                    <tr>
                      <th style={{width:'50px', textAlign:'center'}}>Nº</th>
                      <th style={{width:'150px'}}>EJE EVALUADO</th>
                      <th style={{width:'100px', textAlign:'center'}}>TIPO</th>
                      <th>RESPUESTA CLAVE Y/O RÚBRICA</th>
                    </tr>
                  </thead>
                  <tbody>
                    {test.map((q, idx) => (
                      <tr key={'p'+q.id}>
                        <td style={{textAlign:'center', fontWeight:'bold', fontSize:'1.3rem'}}>{idx+1}</td>
                        <td style={{fontWeight:'bold', color:'#475569'}}>{q.eje}</td>
                        <td style={{textAlign:'center'}}>{q.tipo === 'seleccion' ? 'Opción' : 'Fdes'}</td>
                        <td className={q.tipo === 'desarrollo' ? 'sol-dev' : ''}>
                           {q.tipo === 'seleccion' ? (
                             <div className="key-letter">{q.correcta.substring(0, 2)} <span style={{fontWeight:'normal', fontSize:'1.1rem', color:'#334155'}}>{q.correcta.substring(3)}</span></div>
                           ) : (
                             <div>{q.correcta}</div>
                           )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
               </table>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
