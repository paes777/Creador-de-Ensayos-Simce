<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master SIMCE Pro - Motor IA V11 (Dinámico Seguro)</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #3b82f6; 
      --secondary-color: #f43f5e; 
      --science-color: #10b981; 
      --gpt-color: #8b5cf6;
      --bg-start: #0f172a;
      --bg-end: #020617;
      --text: #f8fafc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
    
    /* DASHBOARD UI */
    .dashboard-wrapper { padding: 3rem; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 3rem; }
    .logo-area { display: flex; align-items: center; gap: 1.5rem; }
    .logo-icon { width: 75px; height: 75px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; background: linear-gradient(135deg, var(--gpt-color), #f43f5e); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); font-size: 2.2rem;}
    .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .grid-layout { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 2.5rem; }
    .panel-section { display: flex; flex-direction: column; gap: 1.2rem; }
    .panel-section h2 { font-size: 1.4rem; color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.8rem; }
    
    .btn-card { padding: 1.8rem; border-radius: 16px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; background: rgba(0,0,0,0.3); font-size: 1.2rem; display: flex; align-items: center; gap: 1rem; font-weight: 600; color: #94a3b8; }
    .btn-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); color: white; }
    
    .btn-card.active.truf { border-color: #38bdf8; background: rgba(56, 189, 248, 0.15); color: white; box-shadow: 0 0 25px rgba(56, 189, 248, 0.2); }
    .btn-card.active.met { border-color: #fbbf24; background: rgba(251, 191, 36, 0.15); color: white; box-shadow: 0 0 25px rgba(251, 191, 36, 0.2); }
    .btn-card.active.grade { border-color: var(--text); background: rgba(255, 255, 255, 0.15); color: white; }
    
    .subj-card { text-align: center; flex-direction: column; opacity: 0.4; pointer-events: none; justify-content: center; height: 100%; transition: 0.4s; }
    .subj-card.ena { opacity: 1; pointer-events: auto; }
    .active.lec { border-color: var(--secondary-color); background: rgba(244,63,94,0.15); color: white; box-shadow: 0 0 25px rgba(244,63,94,0.3); transform: scale(1.02); }
    .active.mat { border-color: var(--primary-color); background: rgba(59,130,246,0.15); color: white; box-shadow: 0 0 25px rgba(59,130,246,0.3); transform: scale(1.02); }
    .active.sci { border-color: var(--science-color); background: rgba(16,185,129,0.15); color: white; box-shadow: 0 0 25px rgba(16,185,129,0.3); transform: scale(1.02); }
    
    .generate-wrap { margin-top: 3rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .gen-btn { font-size: 1.5rem; padding: 1.5rem 4rem; border-radius: 99px; border: none; font-weight: 800; background: #1e293b; color: #64748b; cursor: not-allowed; transition: all 0.4s; display: inline-flex; align-items: center; gap: 1rem; }
    .gen-btn.ready { background: linear-gradient(135deg, var(--gpt-color), var(--secondary-color)); color: white; cursor: pointer; box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5); }
    .gen-btn.ready:hover { transform: scale(1.05) translateY(-5px); }

    /* LOADER OVERLAY V11 */
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2,6,23,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    .loader-box { background: #0f172a; padding: 4rem; border-radius: 20px; border: 1px solid #1e293b; text-align: center; display: flex; flex-direction: column; gap: 1.5rem; box-shadow: 0 0 50px rgba(139, 92, 246, 0.2); max-width: 600px;}
    .spinner { width: 60px; height: 60px; border: 5px solid #1e293b; border-top-color: var(--gpt-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-box h2 { font-size: 1.8rem; background: linear-gradient(to right, #fff, var(--gpt-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
    .loader-box p { color: #94a3b8; font-size: 1.2rem; line-height: 1.6;}

    /* VIEWER */
    .viewer { background: #f1f5f9; min-height: 100vh; color: #0f172a; display: flex; flex-direction: column; }
    .toolbar { background: #0f172a; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; transition: 0.2s; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .btn-print { background: var(--gpt-color); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    .btn-print:hover { transform: translateY(-3px); }

    .doc-container { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; gap: 3rem; }
    .page { background: white; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 15px solid; position: relative; font-family: 'Arial', sans-serif; border-radius: 8px; }
    .page.lec { border-top-color: var(--secondary-color); }
    .page.mat { border-top-color: var(--primary-color); }
    .page.sci { border-top-color: var(--science-color); }
    .pauta-page { border-top-color: #64748b !important; }

    .cover-header { display: flex; justify-content: space-between; border-bottom: 4px solid #cbd5e1; padding-bottom: 1.5rem; margin-bottom: 3rem; }
    .school-sig { display: flex; align-items: center; gap: 1rem; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; color: #1e293b;}
    
    .title-area { text-align: center; margin: 4rem 0; }
    .title-area h1 { font-size: 3.5rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -2px; text-transform: uppercase; }
    .title-area h2 { font-size: 2rem; color: #64748b; }
    
    .student-box { border: 3px solid #64748b; border-radius: 12px; padding: 2.5rem; margin-bottom: 3rem; }
    .s-row { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; font-weight: bold; font-size: 1.2rem; }
    .s-line { flex: 1; border-bottom: 2px solid #94a3b8; height: 1.5rem; }
    
    .instruct { background: #f8fafc; padding: 2.5rem; border-left: 8px solid #475569; border-radius: 0 12px 12px 0; }
    .instruct h3 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #0f172a; }
    .instruct li { margin-bottom: 1rem; font-size: 1.2rem; line-height: 1.6; color: #334155; }
    
    .q-flow { display: flex; flex-direction: column; gap: 4rem; }
    .q-item { page-break-inside: avoid; border-bottom: 1px dashed #cbd5e1; padding-bottom: 2rem; }
    .q-head { display: flex; gap: 1rem; font-size: 1.25rem; color: #0f172a; margin-bottom: 1.5rem; }
    .q-num { font-weight: 900; font-size: 1.5rem; color: #1e293b; min-width: 35px; }
    .q-text { line-height: 1.6; font-weight: 600; font-family: 'Arial', sans-serif;}

    .alts { display: flex; flex-direction: column; gap: 1.2rem; padding-left: 3rem; }
    .alt-row { display: flex; gap: 1rem; color: #1e293b; font-size: 1.2rem; line-height: 1.4; align-items: flex-start; }
    .alt-let { font-weight: 900; color: #0f172a; }
    
    .dev-box { margin-left: 3rem; margin-top: 2rem; border: 2px solid #cbd5e1; height: 250px; border-radius: 12px; padding: 1.5rem; background: #fdf8f6; }
    .dev-inner-lines { width: 100%; height: 100%; background-image: repeating-linear-gradient(transparent, transparent 31px, #cbd5e1 31px, #cbd5e1 32px); }

    .reading-box { border: 3px solid #e2e8f0; padding: 3rem; border-radius: 16px; margin-bottom: 3.5rem; background: #fff; box-shadow: inset 0 0 40px rgba(0,0,0,0.02); page-break-inside: auto; }
    .r-title { text-align: center; font-size: 2rem; font-weight: 900; margin-bottom: 2rem; color: #0f172a; border-bottom: 2px dotted #cbd5e1; padding-bottom: 1rem;}
    .r-txt { font-size: 1.25rem; line-height: 1.9; text-align: justify; color: #1e293b; white-space: pre-wrap; font-family: 'Times New Roman', serif;}

    /* OMR */
    .omr { border: 3px solid #0f172a; border-radius: 12px; padding: 3rem; margin-top: 3rem; }
    .omr-grid { display: flex; justify-content: space-around; gap: 2rem; flex-wrap: wrap; }
    .omr-col { display: flex; flex-direction: column; gap: 1.2rem; }
    .o-row { display: flex; align-items: center; gap: 1.5rem; }
    .o-num { width: 35px; font-weight: 900; font-size: 1.2rem; text-align: right; }
    .o-b { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 2px solid #0f172a; border-radius: 50%; font-size: 0.9rem; font-weight: bold; }

    /* PAUTA DOCENTE */
    .pauta-docente-header { background: #64748b; color: white; padding: 2rem; text-align: center; font-size: 2rem; font-weight: 900; text-transform: uppercase; border-radius: 12px; margin-bottom: 2rem; }
    .pauta-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 1.1rem; }
    .pauta-table th, .pauta-table td { border: 2px solid #cbd5e1; padding: 1rem; text-align: left; }
    .pauta-table th { background: #1e293b; color: white; font-weight: bold; text-transform: uppercase; }
    .pauta-table tr:nth-child(even) { background-color: #f8fafc; }
    .sol-dev { background: #fef3c7 !important; color: #b45309; }

    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .doc-container { padding: 0 !important; gap: 0 !important; }
      .page { box-shadow: none !important; margin: 0 !important; width: 100% !important; border-radius: 0 !important; page-break-after: always; padding: 2cm !important; }
      .page:last-child { page-break-after: auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const IconShield = () => <span style={{fontSize:'2.5rem'}}>🛡️</span>;
    const IconMetrenco = () => <span style={{fontSize:'2.5rem'}}>🏫</span>;

    // ==========================================
    // IA V11: MOTOR SECUENCIAL (Variabilidad Infinita)
    // ==========================================
    const fetchBlock = async (grade, subject, startId, updateStatus) => {
        const endId = startId + 4; // Descargamos de a 5 preguntas
        const isLastBlock = startId === 16;
        
        let formatInst = isLastBlock 
            ? `- ID ${startId} al 18: tipo 'seleccion' con 'alternativas'.\n- ID 19 y 20: tipo 'desarrollo' (usa array de alternativas vacío []).`
            : `- TODAS son del tipo 'seleccion' (debes incluir el array 'alternativas' obligatoriamente con 4 opciones A,B,C,D).`;

        let extraInst = "";
        if (subject === 'lectura') {
            extraInst = `En la pregunta ID ${startId}, REDACTA UN TESTO INÉDITO, LARGO Y FASCINANTE (un cuento chileno, leyenda, o artículo científico diferente cada vez) en la propiedad 'textoLectura' usando '\\n' para saltos. Las preguntas de este bloque deben basarse exclusivamente en este texto. IMPORTANTE: El Cuento debe ser genial y completamente distinto a todo lo típico.`;
        } else {
            extraInst = `Asegúrate de que los problemas (${startId} al ${endId}) contengan variables (números o conceptos) complejos, dinámicos e imprevistos. Que los problemas representen la vida cotidiana chilena. 'textoLectura' déjalo como null a menos que sea un problema ultra largo.`;
        }
        
        const prompt = `ERES EL EQUIPO DE CREACIÓN SIMCE DE CHILE.
Genera un ARRAY JSON ESTRICTO con EXACTAMENTE 5 preguntas INÉDITAS de ${subject} para ${grade} Básico Mineduc.
IDs exactos correlativos: del ${startId} al ${endId}.

Estructura obligatoria por objeto:
- id: número
- tipo: "seleccion" o "desarrollo"
- eje: string temático
- textoLectura: string o null
- enunciado: string
- alternativas: Array de 4 strings iniciados en A) B) C) D) o [] vacío.
- correcta: string de respuesta correcta.

${formatInst}
${extraInst}
NUNCA USES MARKDOWN COMO \`\`\`json. COMIENZA DIRECTAMENTE CON [ Y TERMINA CON ].`;

        // Sistema de Reintentos Seguro
        for (let attempt = 1; attempt <= 3; attempt++) {
            try {
                updateStatus(`Extrayendo Bloque ${startId}-${endId} (Intento ${attempt})...`);
                const response = await fetch("https://text.pollinations.ai/?model=openai&seed=" + Math.random(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: prompt + "\n\nCRITICAL RULE: DO NOT OUTPUT ANY TEXT EXCEPT THE VALID JSON ARRAY []"
                });
                
                if (!response.ok) throw new Error("HTTP " + response.status);
                let rawText = await response.text();
                
                // Limpieza absoluta
                let cutStart = rawText.indexOf('[');
                let cutEnd = rawText.lastIndexOf(']');
                if (cutStart !== -1 && cutEnd !== -1) {
                    rawText = rawText.substring(cutStart, cutEnd + 1);
                } else {
                    throw new Error("El JSON rebotó corrupto.");
                }
                
                const data = JSON.parse(rawText);
                if (!Array.isArray(data) || data.length < 5) throw new Error("A la IA le faltaron preguntas.");
                
                // Forzar corrección de IDs por si la IA se equivoca
                data.forEach((itm, idx) => { itm.id = startId + idx; });
                return data.slice(0, 5);
                
            } catch (err) {
                console.error("Fallo Bloque " + startId, err);
                if (attempt === 3) {
                   throw new Error(`El cerebro de OpenAI colapsó de manera irreversible en el tramo ${startId}-${endId}.`);
                }
                updateStatus(`Proxy saturado en Bloque ${startId}. Reconectando en 6 segundos...`);
                // Enfriamiento de emergencia de 6s
                await new Promise(r => setTimeout(r, 6000));
            }
        }
    };

    // ==========================================
    // INTERFAZ REACT
    // ==========================================
    const App = () => {
      const [view, setView] = useState('dash'); // dash, loading, view
      const [config, setConfig] = useState({});
      const [testData, setTestData] = useState([]);
      const [loadInfo, setLoadInfo] = useState('');

      const generateTestWithAI = async (school, grade, subject) => {
          setView('loading');
          setConfig({ school, grade, subject });
          
          try {
              const masterTest = [];
              // Dividimos las 20 preguntas en 4 bloques de 5 para JAMÁS colapsar la memoria IA.
              for (let start = 1; start <= 16; start += 5) {
                  if (start > 1) {
                     setLoadInfo(`Enfriando conductos (5 segundos) protegiendo el proxy...`);
                     await new Promise(r => setTimeout(r, 5000)); // Pausa de oro anti-ban
                  }
                  const block = await fetchBlock(grade, subject, start, setLoadInfo);
                  masterTest.push(...block);
              }
              setTestData(masterTest);
              setView('view');
          } catch (e) {
              alert("Error Crítico de Red IA: " + e.message + "\n\nOcurre si el servidor gratuito bloqueó su IP. Sugerencia: Reintente en un par de minutos.");
              setView('dash');
          }
      };

      return (
        <div>
          {view === 'dash' && <Dashboard onGen={generateTestWithAI} />}
          {view === 'loading' && (
             <div className="loading-overlay">
                 <div className="loader-box">
                    <div className="spinner"></div>
                    <h2>Motor IA V11 (Dinámico Seguro)</h2>
                    <p>{loadInfo || 'Estableciendo conexión profunda con OpenAI...'}</p>
                 </div>
             </div>
          )}
          {view === 'view' && <PdfViewer cfg={config} test={testData} onBack={() => setView('dash')} />}
        </div>
      );
    };

    const Dashboard = ({ onGen }) => {
      const [sc, setSc] = useState('');
      const [gr, setGr] = useState('');
      const [su, setSu] = useState('');
      const ready = sc && gr && su;

      return (
        <div className="dashboard-wrapper">
          <div className="header glass-panel">
            <div className="logo-area"><div className="logo-icon">V11</div> 
            <div><h1>SIMCE ENGINE: Cerebro Inédito</h1><p style={{color:'#cbd5e1', fontSize:'1.1rem'}}>Generación 100% Única y Lenta (Conexión OpenAI Segura)</p></div></div>
          </div>
          
          <div className="grid-layout">
             <div className="panel-section">
              <h2>🏢 1. Seleccionar Institución</h2>
              <div className={`btn-card glass-panel ${sc==='Escuela Truf-Truf'?'active truf':''}`} onClick={()=>setSc('Escuela Truf-Truf')}>🛡️ Escuela Truf-Truf</div>
              <div className={`btn-card glass-panel ${sc==='Escuela Metrenco'?'active met':''}`} onClick={()=>setSc('Escuela Metrenco')}>🏫 Escuela Metrenco</div>
            </div>

            <div className="panel-section">
              <h2>🎓 2. Asignar Nivel Educativo</h2>
              <div className={`btn-card glass-panel ${gr==='4to'?'active grade':''}`} onClick={()=>{setGr('4to'); setSu('');}}>4° Básico</div>
              <div className={`btn-card glass-panel ${gr==='6to'?'active grade':''}`} onClick={()=>{setGr('6to'); setSu('');}}>6° Básico</div>
            </div>

            <div className="panel-section">
              <h2>📚 3. Base Curricular Lenta</h2>
              <div style={{display:'grid', gap:'1.2rem', gridTemplateColumns:'1fr 1fr', height:'100%'}}>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='lectura'?'active lec':''}`} onClick={()=>gr&&setSu('lectura')}>📖 Lenguaje (Cuentos Nuevos)</div>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='matematica'?'active mat':''}`} onClick={()=>gr&&setSu('matematica')}>🧮 Matemática Inédita</div>
                {gr === '6to' && <div className={`btn-card subj-card ena ${su==='ciencias'?'active sci':''}`} style={{gridColumn:'span 2'}} onClick={()=>setSu('ciencias')}>🧬 Ciencias Complejas</div>}
              </div>
            </div>
          </div>

          <div className="generate-wrap">
            <button className={`gen-btn ${ready?'ready':''}`} onClick={() => ready && onGen(sc, gr, su)}>
               ⚡ Ensamblar Ensayo Único (Tardará 1 Minuto)
            </button>
            <p style={{marginTop:'1.5rem', color:'#94a3b8', fontSize:'0.9rem', maxWidth:'600px'}}>Esta versión consulta una Inteligencia Artificial super potente de manera rigurosamente fraccionada. Cada vez que generes, tendrás 20 preguntas que no existen en ningún otro lugar.</p>
          </div>
        </div>
      );
    };

    const PdfViewer = ({ cfg, test, onBack }) => {
      const sjName = cfg.subject === 'lectura' ? 'Lenguaje' : cfg.subject === 'matematica' ? 'Matemática' : 'Ciencias';
      const grName = cfg.grade === '4to' ? '4° Básico' : '6° Básico';
      const cClass = cfg.subject === 'lectura' ? 'lec' : cfg.subject === 'matematica' ? 'mat' : 'sci';
      
      const mcqs = test.filter(t => t.tipo === 'seleccion');
      
      return (
        <div className="viewer" id="pdf-start">
          <div className="toolbar no-print">
             <button className="btn btn-back" onClick={onBack}>← Volver al Comando Central</button>
             <span style={{fontSize:'1.2rem', fontWeight:'bold'}}>⭐ {cfg.school} | Variación Inédita V11</span>
             <button className="btn btn-print" onClick={()=>window.print()}>🖨️ Ejecutar e Imprimir en Papel A4</button>
          </div>

          <div className="doc-container">
            {/* PORTADA ALUMNO */}
            <div className={`page ${cClass}`}>
              <div className="cover-header">
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} {cfg.school}</div>
                <div style={{textAlign:'right', color:'#64748b'}}><b>Modelo Textual de IA Creadora</b><br/>Edición Única e Inédita</div>
              </div>
              
              <div className="title-area">
                <h1>CUADERNILLO NACIONAL SIMILAR-SIMCE</h1>
                <h2>Estandarización de {sjName} - {grName}</h2>
              </div>
              
              <div className="student-box">
                <div className="s-row">Estudiante Evaluado: <div className="s-line"></div></div>
                <div className="s-row" style={{marginBottom:0}}>
                   <span style={{width:'50%', display:'flex'}}>RUT: <div className="s-line"></div></span>
                   <span style={{width:'50%', display:'flex'}}>Fecha Rinde: <div className="s-line"></div></span>
                </div>
              </div>

              <div className="instruct">
                <h3>INSTRUCCIONES CLÍNICAS:</h3>
                <ul>
                  <li>Este documento formal cuenta con <strong>{test.length} preguntas curriculares</strong> ({mcqs.length} de alternativas, 2 de profunda argumentación escrita).</li>
                  <li>Las historias y cálculos de esta prueba son 100% únicos generados algorítmicamente.</li>
                  <li>Registra tus seleccionadas en la <strong>Hoja de Captura Óptica (OMR)</strong> pintándolo completamente oscuro sin X.</li>
                </ul>
              </div>
            </div>

            {/* PREGUNTAS ALUMNO */}
            <div className={`page ${cClass}`}>
               <div style={{borderBottom:'4px solid #0f172a', paddingBottom:'15px', marginBottom:'40px', fontSize:'1.4rem', fontWeight:'900', textTransform:'uppercase'}}>
                 DESARROLLO DE HABILIDADES COGNITIVAS
               </div>
               <div className="q-flow">
                 {test.map((q) => {
                   return (
                     <div key={q.id} className="q-item">
                        {q.textoLectura && (
                          <div className="reading-box" style={{breakInside:'auto'}}>
                             <div className="r-title">LITERATURA Y LECTURA BASE</div>
                             <div className="r-txt">{q.textoLectura}</div>
                          </div>
                        )}

                        <div className="q-head">
                          <span className="q-num">{q.id}.</span> 
                          <span className="q-text">{q.enunciado}</span>
                        </div>

                        {q.tipo === 'seleccion' ? (
                          <div className="alts">
                            {q.alternativas && q.alternativas.map((alt, i) => {
                              return (
                                <div key={'a'+i} className="alt-row">
                                   <span className="alt-let">{alt.substring(0,2)}</span>
                                   {alt.substring(3)}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="dev-box">
                             <div className="dev-inner-lines"></div>
                          </div>
                        )}
                     </div>
                   )
                 })}
               </div>
            </div>

            {/* HOJA OMR LECTOR OPTICO */}
            <div className="page" style={{pageBreakBefore:'always'}}>
              <div className="cover-header" style={{borderBottomColor:'#0f172a'}}>
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} CAPTURA MATRIZ</div>
                <div style={{fontWeight:'bold', fontSize:'1.2rem', color:'#475569'}}>HOJA DE RESPUESTAS A EVALUAR</div>
              </div>
              <div className="student-box" style={{padding:'1.5rem', borderWidth:'2px'}}>
                 <div className="s-row" style={{marginBottom:0}}>Firma Oficial Estudiante: <div className="s-line" style={{borderStyle:'dashed', borderColor:'black'}}></div></div>
              </div>
              
              <div className="omr">
                 <div style={{textAlign:'center', fontSize:'1.5rem', fontWeight:'900', marginBottom:'1rem'}}>{sjName.toUpperCase()}</div>
                 <div style={{textAlign:'center', marginBottom:'3rem', fontWeight:'bold', color:'#334155'}}>Pinte por completo el interior visual.</div>
                 
                 <div className="omr-grid">
                    {[0, 9].map(colStart => (
                      <div key={'col'+colStart} className="omr-col">
                        {mcqs.slice(colStart, colStart+9).map((q) => {
                           let realID = mcqs.indexOf(q) + 1;
                           return (
                             <div key={'omr'+q.id} className="o-row" style={{marginBottom:'0.5rem'}}>
                               <div className="o-num">{realID}</div>
                               <div className="o-b">A</div><div className="o-b">B</div><div className="o-b">C</div><div className="o-b">D</div>
                             </div>
                           )
                        })}
                      </div>
                    ))}
                 </div>
              </div>
            </div>

            {/* DOCUMENTO DOCENTE */}
            <div className="page pauta-page">
               <div className="pauta-docente-header">
                 MATERIAL EXCLUSIVO DOCENTE SUPERVISOR<br/>
                 <span style={{fontSize:'1.5rem', fontWeight:'600', color:'#e2e8f0'}}>SOLUCIONARIO V11 (IA EXCLUSIVA)</span>
               </div>
               
               <table className="pauta-table">
                  <thead>
                    <tr>
                      <th style={{width:'50px', textAlign:'center'}}>Num</th>
                      <th style={{width:'150px'}}>EJE DE TRABAJO</th>
                      <th style={{width:'80px', textAlign:'center'}}>TIPO</th>
                      <th>RESOLUCIÓN Y CONCLAVE CORRECTA</th>
                    </tr>
                  </thead>
                  <tbody>
                    {test.map((q, idx) => (
                      <tr key={'p'+q.id}>
                        <td style={{textAlign:'center', fontWeight:'bold', fontSize:'1.3rem'}}>{idx+1}</td>
                        <td style={{fontWeight:'bold', color:'#475569', fontSize:'0.9rem'}}>{q.eje}</td>
                        <td style={{textAlign:'center', fontSize:'0.85rem'}}>{q.tipo === 'seleccion' ? 'Opción' : 'Mano Libre'}</td>
                        <td className={q.tipo === 'desarrollo' ? 'sol-dev' : ''}>
                           {q.tipo === 'seleccion' ? (
                             <strong style={{color:'#2563eb', fontSize:'1.2rem'}}>{q.correcta.substring(0, 2)}</strong>
                           ) : (
                             <div style={{fontWeight:'bold'}}>{q.correcta}</div>
                           )}
                           {q.tipo === 'seleccion' && <span style={{marginLeft:'0.5rem', color:'#475569'}}>{q.correcta.substring(3)}</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
               </table>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
