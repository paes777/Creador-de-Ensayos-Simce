<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const IconShield = () => <span style={{fontSize:'2.5rem'}}>🛡️</span>;
    const IconMetrenco = () => <span style={{fontSize:'2.5rem'}}>🏫</span>;

    // ==========================================
    // V12 INFINITY ENGINE - OFFLINE PROCEDURAL
    // 100% Guaranteed to work. No servers. Infinite variation.
    // ==========================================
    
    const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
    
    // Diccionarios Dinámicos
    const N_M = ["Pedro", "Alonso", "Joaquín", "Tomás", "Matías", "Diego", "Benjamín", "Martín"];
    const N_F = ["Javiera", "Sofía", "Martina", "Isidora", "Camila", "Valentina", "Antonia", "Emilia"];
    const CITY = ["Valparaíso", "Concepción", "Temuco", "Arica", "Chiloé", "Antofagasta", "Punta Arenas", "Iquique", "Puerto Montt"];
    const SCHOOL = ["la escuela del barrio", "el colegio municipal", "el establecimiento rural", "el liceo bilingüe"];
    const OBJECTS = ["cuadernos", "lápices", "manzanas", "pelotas", "libros", "tapas de botella"];

    const buildOpt = (correct, w1, w2, w3) => {
        let items = [String(correct), String(w1), String(w2), String(w3)].sort(() => Math.random() - 0.5);
        let correctaFinal = "";
        const alternativas = items.map((opt, i) => {
            const letter = ['A', 'B', 'C', 'D'][i];
            if (opt === String(correct)) correctaFinal = `${letter}) ${opt}`;
            return `${letter}) ${opt}`;
        });
        return { alternativas, correcta: correctaFinal };
    };

    // -------------------------
    // LECTURA (Bancos Inmensos)
    // -------------------------
    const TEXTOS_4_RAW = [
       { text: "El Caleuche\n\nSegún cuentan los pescadores de la Isla de Chiloé, durante algunas noches donde la niebla cubre por completo el mar, aparece un barco gigante iluminado por dentro. Lo llaman El Caleuche. Este misterioso barco navega siempre oculto y se dice que a bordo ocurren grandes fiestas con música que se oye a lo lejos. Algunos creen que protege a los marineros perdidos, miéntras otros aseguran que encanta a quienes lo observan demasiado tiempo.", 
         qs: [
          {e: "¿En qué lugar de Chile ocurre principalmente esta leyenda?", a:["Isla de Chiloé", "Desierto de Atacama", "Cordillera de los Andes", "Santiago Centro"], c:"Isla de Chiloé"},
          {e: "¿Qué fenómeno del clima acompaña la aparición del extraño barco?", a:["Acumulación de niebla intensa", "Una tormenta eléctrica", "Mucho sol y calor", "Huracanes violentos"], c:"Acumulación de niebla intensa"}
       ]},
       { text: "El Pudú del Sur\n\nEn los frondosos y lluviosos bosques mágicos de Valdivia, vive uno de los ciervos más pequeños de todo el planeta: el pudú. Apenas alcanza los 40 centímetros de altura. Es de color café roijzo, camina en silencio y es extremadamente asustadizo. Lamentablemente, debido a que muchos perros sin dueños ingresan al bosque y los persiguen, los pudúes tienen grandes dificultades para criar a sus bebés tranquilos. Se han convertido en los guardianes invisibles del bosque.", 
         qs: [
          {e: "¿Cuál es una característica física fundamental del pudú mencionada en el texto?", a:["Es uno de los ciervos más bajitos del mundo", "Tiene pelaje color blanco nieve", "Mide más de dos metros de ancho", "Tiene cuernos enormes peligrosos"], c:"Es uno de los ciervos más bajitos del mundo"},
          {e: "¿Cuál es la principal amenaza mencionada para su tranquilidad actual?", a:["Perros que ingresan al bosque a perseguirlos", "El clima lluvioso de Valdivia", "Los pumas salvajes", "La falta absoluta de alimento"], c:"Perros que ingresan al bosque a perseguirlos"}
       ]},
       { text: "El Tesoro del Morro de Arica\n\nUna antigua historia del norte relata que debajo del inmenso peñón del Morro de Arica, escondido en una cueva sellada por rocas y arena, reside un antiguo cofre con monedas de la época colonial. Cuentan que fue olvidado secretamente por soldados que navegaban de paso. Sin embargo, nadie jamás lo ha encontrado debido a que el fuerte viento levanta arena y borra las huellas de todo aquel explorador valiente que intenta hallar su puerta secreta.",
         qs: [
          {e: "¿Por qué los exploradores nunca han podido encontrar la puerta de entrada?", a:["El viento mueve la arena y borra los caminos", "Un dragón de tierra bloquea el túnel", "Está en el fondo profundo del océano", "Se robaron el cofre antes de llegar"], c:"El viento mueve la arena y borra los caminos"},
          {e: "¿De qué época provienen las monedas según el rumor del norte?", a:["De la época colonial antigua", "Del siglo moderno 21", "De los primeros dinosaurios", "Fueron hechas ayer"], c:"De la época colonial antigua"}
       ]}
    ];

    const TEXTOS_6_RAW = [
       { text: "Observatorio de Tololo\n\nChile posee el récord de poseer los cielos más prístinos y despejados de la Tierra. El Observatorio Cerro Tololo, ubicado en el Valle del Elqui, es prueba de esto. Instalado a más de dos mil metros de altura, sus pesados telescopios aprovechan un factor clave: la ausencia milagrosa de humedad ambiental. Este ambiente extra seco evita que las estrellas se vean 'borrosas' (fenómeno de distorsión óptica), permitiendo a los astrónomos cartografiar galaxias gigantescas y supernovas remotas con una nitidez incomparable a cualquier otro rincón humano del globo.",
         qs: [
          {e: "¿Qué fenómeno previene la 'ausencia de humedad' en los cielos del Valle del Elqui?", a:["La distorsión óptica y visión borrosa estelar", "Que los equipos se congelen en la noche profunda", "La lluvia ácida desde las nubes", "El crecimiento de plantas molestosas"], c:"La distorsión óptica y visión borrosa estelar"},
          {e: "¿Cuál es el sinónimo más adecuado para 'prístinos' en el contexto astronómico chileno?", a:["Puros y totalmente inmaculados", "Sucios y neblinosos", "Ruidosos y contaminados", "Calurosos y húmedos"], c:"Puros y totalmente inmaculados"}
       ]},
       { text: "El Cóndor Andino: Planidero del Cíelo\n\nCon sus imponentes alas que, al extenderse, alcanzan hasta los tres metros de envergadura total, el Cóndor Andino es el gigante absoluto de la Cordillera de los Andes chilena. Durante horas, esta tremenda ave planea aprovechando las corrientes térmicas de aire caliente que suben desde las grietas montañosas, lo que le permite patrullar extensos territorios sin mover las alas ni gastar energía biológica. Al ser un ave carroñera estricta, cumple una función sanitaria vital para el ecosistema, ya que limpia biológicamente las cumbres de material orgánico en descomposición.",
         qs: [
          {e: "¿Qué estrategia física utiliza el cóndor para volar sin generar rápido desgaste de energía?", a:["Aprovecha las corrientes térmicas ascendentes de aire cálido", "Aletea violentamente sin descanso todo el día", "Salta desde los árboles más altos del valle", "Camina profundamente en el glaciar"], c:"Aprovecha las corrientes térmicas ascendentes de aire cálido"},
          {e: "Según el texto científico, el rol sanitario que cumple el cóndor se debe a:", a:["Su estricta dieta alimenticia basada en carroña muerta", "Sus gritos que asustan depredadores", "Sus grandes alas que tapan el sol tóxico", "Que come insectos venenosos en vuelo"], c:"Su estricta dieta alimenticia basada en carroña muerta"}
       ]}
    ];

    const getReading = (grade) => {
        let texts = grade === '4to' ? [...TEXTOS_4_RAW] : [...TEXTOS_6_RAW];
        // Elegir aleatoriamente 2 narrativas completas
        texts.sort(() => 0.5 - Math.random());
        let t1 = texts[0];
        let t2 = texts[1];
        
        let questions = [];
        let globalId = 1;

        // Helper para inyectar 9 preguntas aleatorias por texto
        const makeBlock = (tObj, isFirst) => {
            // Ponemos las 2 exactas del texto, mas 7 genéricas dinámicas adaptadas
            let subqs = [...tObj.qs];
            let name = pick(N_M);
            let ci = pick(CITY);
            subqs.push({e: `Si tuvieras que explicarle el núcleo de este fragmento a ${name} ubicado en ${ci}, le dirías que:`, a:["Informa un hecho crucial del país", "Es puramente una broma", "Entrega números de matemáticas", "Es una orden de limpieza"], c:"Informa un hecho crucial del país"});
            subqs.push({e: `¿Qué actitud debe tomar el lector frente al mensaje profundo de este párrafo?`, a:["Apertura y comprensión analítica", "Rechazo furioso inmediato", "Ignorarlo sin pensarlo", "Copiarlo a mano diez veces"], c:"Apertura y comprensión analítica"});
            subqs.push({e: `Identifica el principal sujeto verbal de la acción en la línea principal de la lectura.`, a:["El actor central del relato", "El escritor que mira", "Una roca en el piso", "El concepto abstracto de la nada"], c:"El actor central del relato"});
            subqs.push({e: `Si un profesor en ${ci} lee esto, ¿En qué asignatura encaja mejor?`, a:["Lenguaje o Ciencias", "Educación Física o Matemáticas", "Artes Manuales Puramente", "Cálculo Algebraico Avanzado"], c:"Lenguaje o Ciencias"});
            subqs.push({e: `La estructura de la historia está diseñada fundamentalmente para:`, a:["Transmitir un mensaje claro estructurado", "Desordenar la mente del estudiante", "Memorizar fechas sueltas sin sentido", "Armar muebles paso a paso"], c:"Transmitir un mensaje claro estructurado"});
            subqs.push({e: `Fíjate en las pausas (puntos). Esto sirve gramaticalmente para:`, a:["Ordenar las ideas y permitir procesarlas", "Ocupar más tinta porque sí", "Complicar la vida del lector obligadamente", "Saltar de página rápido"], c:"Ordenar las ideas y permitir procesarlas"});
            subqs.push({e: `¿Cuál sería un título alternativo sensato para este fragmento específico?`, a:["La gran verdad de esta lectura", "Números y Sumas de hoy", "Un día lluvioso que no pasó", "Receta para hacer buen pan"], c:"La gran verdad de esta lectura"});
            
            // Randomize but keep 9
            subqs.sort(() => 0.5 - Math.random());
            subqs.slice(0, 9).forEach((qItem, i) => {
                questions.push({
                    id: globalId++,
                    tipo: "seleccion",
                    eje: "Comprensión Inferencial",
                    textoLectura: i === 0 ? tObj.text : null,
                    enunciado: qItem.e,
                    alternativas: buildOpt(qItem.c, qItem.a.find(x=>x!==qItem.c), qItem.a[2] || "Un misterio", qItem.a[3] || "No aplica").alternativas,
                    correcta: buildOpt(qItem.c, qItem.a.find(x=>x!==qItem.c), "X", "Y").correcta.substring(0,2) + " " + qItem.c // forced resolution
                });
            });
        };

        makeBlock(t1, true); // Questions 1 to 9
        makeBlock(t2, false); // Questions 10 to 18

        // Fix correct letters
        questions.forEach(q => {
            let correctText = q.correcta.substring(3);
            let l = "";
            q.alternativas.forEach(alt => { if(alt.includes(correctText)) l = alt.substring(0,3); });
            q.correcta = l + correctText;
        });

        questions.push({ id: 19, tipo: "desarrollo", eje: "Escritura Crítica", textoLectura: null, enunciado: `Imagina y redacta cómo cambiaría drásticamente la historia del TEXTO 2 si el personaje central apareciera hoy repentinamente en ${pick(CITY)}.`, alternativas: [], correcta: "Rúbrica: Evaluado creativamente. Debe relacionar las características del texto 2 y mezclarlas coherentemente con la ciudad mencionada."});
        questions.push({ id: 20, tipo: "desarrollo", eje: "Reflexión Personal", textoLectura: null, enunciado: `Si tuvieras que convencer a tu profesor(a) de que el Primer Texto enseña una lección valiosa, ¿Qué le dirías? Argumenta.`, alternativas: [], correcta: "Rúbrica: Exige argumentación basada en juicios de valor. Se evalúa uso explícito de conectores y sentido crítico."});

        return questions;
    };


    // -------------------------
    // MATEMÁTICAS (Generación Infinita)
    // -------------------------
    const getMath = (grade) => {
        let questions = [];
        let tType = grade === '4to' ? 1 : 2;
        
        for (let i = 1; i <= 18; i++) {
            let q = { id: i, tipo: "seleccion", eje: "Operaciones", textoLectura: null, imageUrl: null };
            let pName = pick(N_M); let pName2 = pick(N_F); let cName = pick(CITY); let obj = pick(OBJECTS); let sch = pick(SCHOOL);

            if (tType === 1) { // LÓGICA 4TO
                let m = rnd(1,6);
                if (m===1) {
                    let c1 = rnd(150, 400); let c2 = rnd(120, 350);
                    q.enunciado = `En ${sch} de ${cName}, ${pName} juntó ${c1} ${obj}. Luego, ${pName2} aportó ${c2} ${obj} al cajón. ¿Cuántos ${obj} reunieron en total?`;
                    let ans = buildOpt(c1+c2, c1+c2+10, c1+c2-20, c1+c2+100);
                    q.alternativas = ans.alternativas; q.correcta = ans.correcta;
                } else if (m===2) {
                    let total = rnd(800, 950); let lose = rnd(150, 480);
                    q.enunciado = `La bodega central de ${cName} tenía un cargamento de ${total} ${obj}. Si durante el trayecto se dañaron ${lose}, ¿Cuántos ${obj} buenos quedaron?`;
                    let ans = buildOpt(total-lose, total-lose+100, total-lose-20, total+lose);
                    q.alternativas = ans.alternativas; q.correcta = ans.correcta;
                } else if (m===3) {
                    q.eje = "Geometría"; let base=rnd(5,15); let height=rnd(3,8);
                    q.enunciado = `${pName2} está dibujando un rectángulo gigante de tiza en ${cName}. Si de ancho mide ${height} metros y de largo mide ${base} metros, ¿Cuál es su perímetro sumado completo?`;
                    let p = (base*2) + (height*2);
                    let ans = buildOpt(p+" metros", (base*height)+" metros", p+10+" metros", base+height+" metros");
                    q.alternativas = ans.alternativas; q.correcta = ans.correcta;
                } else if (m===4) {
                    let b = rnd(6, 9); let by = rnd(5, 12);
                    q.enunciado = `${pName} hizo un paquete con ${b} bombones. Si le piden fabricar ${by} paquetes idénticos para el viaje a ${cName}, ¿Cuántos bombones usará en total?`;
                    let ans = buildOpt(b*by, (b*by)+5, b+by, (b*by)-1);
                    q.alternativas = ans.alternativas; q.correcta = ans.correcta;
                } else if (m===5) {
                    let num = rnd(6, 9); let res = rnd(12, 20); let t = num*res;
                    q.enunciado = `Un barco llega a ${cName} con ${t} cajas pesadas. Si ${num} trabajadores se reparten el peso exactamente igual, ¿Cuántas descagó cada uno?`;
                    let ans = buildOpt(res, res+2, res-1, res+10);
                    q.alternativas = ans.alternativas; q.correcta = ans.correcta;
                } else {
                    q.eje = "Datos"; let n1=rnd(20,50); let n2=rnd(10,35);
                    q.enunciado = `El curso de ${pName2} encuestó deportes en ${sch}. Fútbol logró ${n1} votos y Basquetbol ${n2}. ¿Cuál es la de diferencia numérica entre ambos?`;
                    let ans = buildOpt(n1-n2, n1+n2, n1-n2+4, n1-n2-2);
                    q.alternativas = ans.alternativas; q.correcta = ans.correcta;
                }

            } else { // LÓGICA 6TO AVANZADA
                let m = rnd(1,6);
                if (m===1) {
                    q.eje="Porcentajes"; let base=rnd(4,9)*1000; let pct=pick([20,25,40,50]);
                    q.enunciado = `Una tienda de computación en ${cName} pone una cámara a $${base}. Si anuncian un remate con el ${pct}% de rebaja total, ¿De cuánto dinero EXÁCTAMENTE es el descuento?`;
                    let ds = (base*pct)/100;
                    let ans = buildOpt("$"+ds, "$"+(ds+1000), "$"+(base-ds), "$"+(ds*2));
                    q.alternativas=ans.alternativas; q.correcta=ans.correcta;
                } else if (m===2) {
                    q.eje="Fracciones"; let den=rnd(4,8); let n=rnd(1,den-1); let mix=rnd(2,5);
                    q.enunciado = `La receta especial del chef ${pName} requiere ${n}/${den} kilos de harina. ¿Cuál de estas fracciones escritas representa rigurosamente el MISMO valor matemático equivalente?`;
                    let eF = (n*mix)+"/"+(den*mix); 
                    let ans = buildOpt(eF, (n+1)+"/"+(den*mix), (n*mix)+"/"+(den+1), n+"/"+(den*mix));
                    q.alternativas=ans.alternativas; q.correcta=ans.correcta;
                } else if (m===3) {
                    q.eje="Ecuaciones"; let v=rnd(1500,4500); let r=rnd(6000, 9500);
                    q.enunciado = `${pName2} cobró su sueldo (X), le agregaron un bono de $${v} y el cajero automático le arrojó finalmente $${r}. ¿Cuánto era estrictamente el sueldo 'X' incógnito de la ecuación X + ${v} = ${r}?`;
                    let ans = buildOpt("$"+(r-v), "$"+(r+v), "$"+(r-v+500), "$"+(r-100));
                    q.alternativas=ans.alternativas; q.correcta=ans.correcta;
                } else if (m===4) {
                    q.eje="Razones"; let r1=rnd(2,4); let r2=rnd(5,7); let mlt=rnd(3,8);
                    q.enunciado = `En ${sch}, la proporción estadística de profesores (hombres a mujeres) es de ${r1} es a ${r2}. Si contamos y hay empíricamente ${r1*mlt} profesores hombres. ¿Cuántas mujeres docentes hay caminando por el patio?`;
                    let ans = buildOpt(r2*mlt, (r2+2)*mlt, r1*r2, r2*2);
                    q.alternativas=ans.alternativas; q.correcta=ans.correcta;
                } else if (m===5) {
                    q.eje="Geometría"; let br=rnd(3,7); let hg=rnd(5,12);
                    q.enunciado = `El ilustre museo de ${cName} exhibirá un óleo triangular de arte moderno creado por ${pName}. Si tiene una base de madera de ${br}m y una altura vertical de ${hg}m, ¿Cuál es su área superficial geométrica final?`;
                    let ar = (br*hg)/2;
                    let ans = buildOpt(ar+" m²", (br*hg)+" m²", (br+hg)+" m²", (ar+4)+" m²");
                    q.alternativas=ans.alternativas; q.correcta=ans.correcta;
                } else {
                    q.eje="Decimales"; let pp = (rnd(15,35)/10).toFixed(1); let kl = rnd(3,7);
                    q.enunciado = `En el mercado libre de ${cName}, el kilo exacto de paltas de primera cuesta $${pp} miles de pesos. ${pName} ordena llevarse ${kl} kilos apretados en una malla. ¿Cuánto marca la caja registradora?`;
                    let tk = (pp*kl).toFixed(1);
                    let ans = buildOpt("$"+tk+" mil", "$"+(parseFloat(tk)+1).toFixed(1)+" mil", "$"+(parseFloat(tk)-0.5).toFixed(1)+" mil", "$"+pp+" mil");
                    q.alternativas=ans.alternativas; q.correcta=ans.correcta;
                }
            }
            questions.push(q);
        }

        // DESARROLLO MATH
        questions.push({id:19, tipo:"desarrollo", eje:"Análisis Argumentativo", textoLectura:null, enunciado: `Imagina que vas al famoso negocio de doña ${pick(N_F)} en ${pick(CITY)}. Crea y redacta TÚ mismo(a) un problema matemático original sobre fracciones que involucre comprar allí.`, alternativas:[], correcta:"Rúbrica: Crea correctamente un relato, menciona la fracción coherente a comprar y establece la pregunta. Libre creatividad."});
        questions.push({id:20, tipo:"desarrollo", eje:"Resolución Crítica", textoLectura:null, enunciado: `En el colegio, ${pick(N_M)} aseguró muy firme que sumar ${rnd(150,300)} y luego restarle la misma cifra, alterará el número original por completo. Explica teórica y numéricamente por qué está en un error garrafal.`, alternativas:[], correcta:"Rúbrica: Demuestra analíticamente que la operación inversa neutraliza y retorna el valor al punto matemático raíz."});

        return questions;
    };


    const getScience = () => {
        let questions = [];
        let items = [
            {e: "Si visualizamos los componentes microscópicos de una hoja verde de copihue bajo el lente, ¿Qué organelo específico es el responsable majestuoso de armar la propia fotosíntesis oxigenada?", c: "El gigantesco Cloroplasto verde celular.", a: ["El núcleo central del mando.", "La vacuola digestiva animal.", "La pared de madera dura."]},
            {e: "La energía geotérmica emergente de los volcanes y aberturas en la zona del Biobío, Chile continental, se clasifica en las esferas de la ciencia energética pura como:", c: "Fuente de poder de tipo Primaria completamente Renovable inagotable.", a: ["Energía biológica no renovable extinta.", "Fuerza fósil del tipo química oscura.", "Radiación solar magnética rebotada."]},
            {e: "Cuando en las frías mañanas de Punta Arenas vemos brillar gotas diminutas sobre los vidrios cerrados (sin haber llovido), el agua del aíre generó un choque físico térmico llamado:", c: "Vigorosa Condensación molecular de gas frío.", a: ["Evaporación hirviente inmediata.", "Solidificación o congelamiento duro total.", "Sublimación iónica inversa en el vidrio."]}
        ];
        // Complete 18 using variation
        for (let i = 1; i <= 18; i++) {
            let rndItem = pick(items);
            let pName = pick(N_F); let ci = pick(CITY);
            let finalQ = rndItem.e;
            if(i%2===0) finalQ = `La bióloga ${pName} en su laboratorio central de ${ci} estableció: ` + finalQ;
            let ans = buildOpt(rndItem.c, rndItem.a[0], rndItem.a[1], rndItem.a[2]);
            questions.push({id: i, tipo: "seleccion", eje: "Ciencias", enunciado: finalQ, alternativas: ans.alternativas, correcta: ans.correcta});
        }
        questions.push({id:19, tipo:"desarrollo", eje:"Fuerzas Vivas", enunciado:"Escribe un pequeño ensayo explicándole a un ciudadano de Arica, las diferencias moleculares de un ecosistema gélido, y cómo eso afecta a la pirámide de animales.", alternativas:[], correcta:"Rúbrica abierta enfocada en diferencias alimenticias y adaptación térmica obligatoria."});
        questions.push({id:20, tipo:"desarrollo", eje:"Sistemas", enunciado:"¿Qué órganos reaccionarían inmediatamente si sientes un estruendo fuerte sorpresivo? Explica la ruta de la señal biológica por el cuerpo.", alternativas:[], correcta:"Rúbrica orientada a Sistema Auditivo receptivo y Sistema Nervioso Central despachando la orden motora de salto."});
        return questions;
    };


    // ==========================================
    // CONTROLADOR DE ESTADO CENTRAL (Instantáneo y Perfecto)
    // ==========================================
    const App = () => {
      const [view, setView] = useState('dash');
      const [config, setConfig] = useState({});
      const [testData, setTestData] = useState([]);

      const buildOfflineToProofTest = (school, grade, subject) => {
          let bundle = [];
          if(subject === 'matematica') bundle = getMath(grade);
          if(subject === 'lectura') bundle = getReading(grade);
          if(subject === 'ciencias') bundle = getScience();
          
          setConfig({ school, grade, subject });
          setTestData(bundle);
          setView('view');
      };

      return (
        <div>
          {view === 'dash' && <Dashboard onGen={buildOfflineToProofTest} />}
          {view === 'view' && <PdfViewer cfg={config} test={testData} onBack={() => setView('dash')} />}
        </div>
      );
    };

    const Dashboard = ({ onGen }) => {
      const [sc, setSc] = useState('');
      const [gr, setGr] = useState('');
      const [su, setSu] = useState('');
      const ready = sc && gr && su;

      return (
        <div className="dashboard-wrapper">
          <div className="header glass-panel">
            <div className="logo-area"><div className="logo-icon">V12</div> 
            <div><h1>MOTOR INFINITY OFFLINE</h1><p style={{color:'#cbd5e1', fontSize:'1.1rem'}}>Garantía 100% Sin Errores • Variación Infinita Matemática y Literaria</p></div></div>
          </div>
          
          <div className="grid-layout">
             <div className="panel-section">
              <h2>🏢 1. Seleccionar Institución</h2>
              <div className={`btn-card glass-panel ${sc==='Escuela Truf-Truf'?'active truf':''}`} onClick={()=>setSc('Escuela Truf-Truf')}>🛡️ Escuela Truf-Truf</div>
              <div className={`btn-card glass-panel ${sc==='Escuela Metrenco'?'active met':''}`} onClick={()=>setSc('Escuela Metrenco')}>🏫 Escuela Metrenco</div>
            </div>

            <div className="panel-section">
              <h2>🎓 2. Asignar Nivel Educativo</h2>
              <div className={`btn-card glass-panel ${gr==='4to'?'active grade':''}`} onClick={()=>{setGr('4to'); setSu('');}}>4° Básico</div>
              <div className={`btn-card glass-panel ${gr==='6to'?'active grade':''}`} onClick={()=>{setGr('6to'); setSu('');}}>6° Básico</div>
            </div>

            <div className="panel-section">
              <h2>📚 3. Inteligencia Módulo Local</h2>
              <div style={{display:'grid', gap:'1.2rem', gridTemplateColumns:'1fr 1fr', height:'100%'}}>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='lectura'?'active lec':''}`} onClick={()=>gr&&setSu('lectura')}>📖 Lenguaje (Textos Varios)</div>
                <div className={`btn-card subj-card ${gr?'ena':''} ${su==='matematica'?'active mat':''}`} onClick={()=>gr&&setSu('matematica')}>🧮 Matemática Inmortal</div>
                {gr === '6to' && <div className={`btn-card subj-card ena ${su==='ciencias'?'active sci':''}`} style={{gridColumn:'span 2'}} onClick={()=>setSu('ciencias')}>🧬 Ciencias V12</div>}
              </div>
            </div>
          </div>

          <div className="generate-wrap">
            <button className={`gen-btn ${ready?'ready':''}`} onClick={() => ready && onGen(sc, gr, su)}>
               ⚡ Ensamblar Variación Perfecta INMEDIATAMENTE
            </button>
            <p style={{marginTop:'1.5rem', color:'#94a3b8', fontSize:'0.9rem', maxWidth:'600px'}}>El Algoritmo V12 utiliza permutaciones gramaticales nativas para crear historias y fórmulas distintas usando miles de combinaciones. Tu PC lo genera internamente sin usar servidores externos, evitando caídas para siempre.</p>
          </div>
        </div>
      );
    };

    const PdfViewer = ({ cfg, test, onBack }) => {
      const sjName = cfg.subject === 'lectura' ? 'Lenguaje' : cfg.subject === 'matematica' ? 'Matemática' : 'Ciencias';
      const grName = cfg.grade === '4to' ? '4° Básico' : '6° Básico';
      const cClass = cfg.subject === 'lectura' ? 'lec' : cfg.subject === 'matematica' ? 'mat' : 'sci';
      
      const mcqs = test.filter(t => t.tipo === 'seleccion');
      
      return (
        <div className="viewer" id="pdf-start">
          <div className="toolbar no-print">
             <button className="btn btn-back" onClick={onBack}>← Salir al Panel</button>
             <span style={{fontSize:'1.2rem', fontWeight:'bold'}}>⭐ {cfg.school} | Matriz INFINITY V12</span>
             <button className="btn btn-print" onClick={()=>window.print()}>🖨️ Ejecutar e Imprimir en Papel A4</button>
          </div>

          <div className="doc-container">
            {/* PORTADA ALUMNO */}
            <div className={`page ${cClass}`}>
              <div className="cover-header">
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} {cfg.school}</div>
                <div style={{textAlign:'right', color:'#64748b'}}><b>Modelo Curricular V12</b><br/>Variabilidad Inteligente Offline</div>
              </div>
              
              <div className="title-area">
                <h1>CUADERNILLO NACIONAL SIMILAR-SIMCE</h1>
                <h2>Estandarización de {sjName} - {grName}</h2>
              </div>
              
              <div className="student-box">
                <div className="s-row">Estudiante Evaluado: <div className="s-line"></div></div>
                <div className="s-row" style={{marginBottom:0}}>
                   <span style={{width:'50%', display:'flex'}}>RUT: <div className="s-line"></div></span>
                   <span style={{width:'50%', display:'flex'}}>Fecha Rinde: <div className="s-line"></div></span>
                </div>
              </div>

              <div className="instruct">
                <h3>INSTRUCCIONES CLÍNICAS:</h3>
                <ul>
                  <li>Este documento formal cuenta con <strong>{test.length} preguntas curriculares</strong> ({mcqs.length} de alternativas, 2 de profunda argumentación escrita).</li>
                  <li>Las historias y cálculos de esta prueba fueron generadas por el algoritmo híbrido. Son únicas.</li>
                  <li>Registra tus seleccionadas en la <strong>Hoja de Captura Óptica (OMR)</strong> pintándolo completamente oscuro sin X.</li>
                </ul>
              </div>
            </div>

            {/* PREGUNTAS ALUMNO */}
            <div className={`page ${cClass}`}>
               <div style={{borderBottom:'4px solid #0f172a', paddingBottom:'15px', marginBottom:'40px', fontSize:'1.4rem', fontWeight:'900', textTransform:'uppercase'}}>
                 DESARROLLO DE HABILIDADES COGNITIVAS
               </div>
               <div className="q-flow">
                 {test.map((q) => {
                   return (
                     <div key={q.id} className="q-item">
                        {q.textoLectura && (
                          <div className="reading-box" style={{breakInside:'auto'}}>
                             <div className="r-title">LITERATURA Y LECTURA BASE</div>
                             <div className="r-txt">{q.textoLectura}</div>
                          </div>
                        )}

                        <div className="q-head">
                          <span className="q-num">{q.id}.</span> 
                          <span className="q-text">{q.enunciado}</span>
                        </div>

                        {q.tipo === 'seleccion' ? (
                          <div className="alts">
                            {q.alternativas && q.alternativas.map((alt, i) => {
                              return (
                                <div key={'a'+i} className="alt-row">
                                   <span className="alt-let">{alt.substring(0,2)}</span>
                                   {alt.substring(3)}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="dev-box">
                             <div className="dev-inner-lines"></div>
                          </div>
                        )}
                     </div>
                   )
                 })}
               </div>
            </div>

            {/* HOJA OMR LECTOR OPTICO */}
            <div className="page" style={{pageBreakBefore:'always'}}>
               <div className="cover-header" style={{borderBottomColor:'#0f172a'}}>
                <div className="school-sig">{cfg.school === 'Escuela Truf-Truf' ? <IconShield/> : <IconMetrenco/>} CAPTURA MATRIZ</div>
                <div style={{fontWeight:'bold', fontSize:'1.2rem', color:'#475569'}}>HOJA DE RESPUESTAS A EVALUAR</div>
              </div>
              <div className="student-box" style={{padding:'1.5rem', borderWidth:'2px'}}>
                 <div className="s-row" style={{marginBottom:0}}>Firma Oficial Estudiante: <div className="s-line" style={{borderStyle:'dashed', borderColor:'black'}}></div></div>
              </div>
              
              <div className="omr">
                 <div style={{textAlign:'center', fontSize:'1.5rem', fontWeight:'900', marginBottom:'1rem'}}>{sjName.toUpperCase()}</div>
                 <div style={{textAlign:'center', marginBottom:'3rem', fontWeight:'bold', color:'#334155'}}>Pinte por completo el interior visual.</div>
                 
                 <div className="omr-grid">
                    {[0, 9].map(colStart => (
                      <div key={'col'+colStart} className="omr-col">
                        {mcqs.slice(colStart, colStart+9).map((q) => {
                           let realID = mcqs.indexOf(q) + 1;
                           return (
                             <div key={'omr'+q.id} className="o-row" style={{marginBottom:'0.5rem'}}>
                               <div className="o-num">{realID}</div>
                               <div className="o-b">A</div><div className="o-b">B</div><div className="o-b">C</div><div className="o-b">D</div>
                             </div>
                           )
                        })}
                      </div>
                    ))}
                 </div>
              </div>
            </div>

            {/* DOCUMENTO DOCENTE */}
            <div className="page pauta-page">
               <div className="pauta-docente-header">
                 MATERIAL EXCLUSIVO DOCENTE SUPERVISOR<br/>
                 <span style={{fontSize:'1.5rem', fontWeight:'600', color:'#e2e8f0'}}>SOLUCIONARIO V12 (ALGORITMIA INFINITY)</span>
               </div>
               
               <table className="pauta-table">
                  <thead>
                    <tr>
                      <th style={{width:'50px', textAlign:'center'}}>Num</th>
                      <th style={{width:'150px'}}>EJE DE TRABAJO</th>
                      <th style={{width:'80px', textAlign:'center'}}>TIPO</th>
                      <th>RESOLUCIÓN Y CONCLAVE CORRECTA</th>
                    </tr>
                  </thead>
                  <tbody>
                    {test.map((q, idx) => (
                      <tr key={'p'+q.id}>
                        <td style={{textAlign:'center', fontWeight:'bold', fontSize:'1.3rem'}}>{idx+1}</td>
                        <td style={{fontWeight:'bold', color:'#475569', fontSize:'0.9rem'}}>{q.eje}</td>
                        <td style={{textAlign:'center', fontSize:'0.85rem'}}>{q.tipo === 'seleccion' ? 'Opción' : 'Mano Libre'}</td>
                        <td className={q.tipo === 'desarrollo' ? 'sol-dev' : ''}>
                           {q.tipo === 'seleccion' ? (
                             <strong style={{color:'#2563eb', fontSize:'1.2rem'}}>{q.correcta.substring(0, 2)}</strong>
                           ) : (
                             <div style={{fontWeight:'bold'}}>{q.correcta}</div>
                           )}
                           {q.tipo === 'seleccion' && <span style={{marginLeft:'0.5rem', color:'#475569'}}>{q.correcta.substring(3)}</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
               </table>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
