<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master SIMCE Pro - Generador Curricular Offline (V10)</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #3b82f6; 
      --secondary-color: #f43f5e; 
      --science-color: #10b981; 
      --gpt-color: #8b5cf6;
      --bg-start: #0f172a;
      --bg-end: #020617;
      --text: #f8fafc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
    
    /* DASHBOARD UI */
    .dashboard-wrapper { padding: 3rem; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 3rem; }
    .logo-area { display: flex; align-items: center; gap: 1.5rem; }
    .logo-icon { width: 75px; height: 75px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; background: linear-gradient(135deg, var(--gpt-color), #2563eb); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); font-size: 2.2rem;}
    .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .grid-layout { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 2.5rem; }
    .panel-section { display: flex; flex-direction: column; gap: 1.2rem; }
    .panel-section h2 { font-size: 1.4rem; color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.8rem; }
    
    .btn-card { padding: 1.8rem; border-radius: 16px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; background: rgba(0,0,0,0.3); font-size: 1.2rem; display: flex; align-items: center; gap: 1rem; font-weight: 600; color: #94a3b8; }
    .btn-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); color: white; }
    
    .btn-card.active.truf { border-color: #38bdf8; background: rgba(56, 189, 248, 0.15); color: white; box-shadow: 0 0 25px rgba(56, 189, 248, 0.2); }
    .btn-card.active.met { border-color: #fbbf24; background: rgba(251, 191, 36, 0.15); color: white; box-shadow: 0 0 25px rgba(251, 191, 36, 0.2); }
    .btn-card.active.grade { border-color: var(--text); background: rgba(255, 255, 255, 0.15); color: white; }
    
    .subj-card { text-align: center; flex-direction: column; opacity: 0.4; pointer-events: none; justify-content: center; height: 100%; transition: 0.4s; }
    .subj-card.ena { opacity: 1; pointer-events: auto; }
    .active.lec { border-color: var(--secondary-color); background: rgba(244,63,94,0.15); color: white; box-shadow: 0 0 25px rgba(244,63,94,0.3); transform: scale(1.02); }
    .active.mat { border-color: var(--primary-color); background: rgba(59,130,246,0.15); color: white; box-shadow: 0 0 25px rgba(59,130,246,0.3); transform: scale(1.02); }
    .active.sci { border-color: var(--science-color); background: rgba(16,185,129,0.15); color: white; box-shadow: 0 0 25px rgba(16,185,129,0.3); transform: scale(1.02); }
    
    .generate-wrap { margin-top: 3rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .gen-btn { font-size: 1.5rem; padding: 1.5rem 4rem; border-radius: 99px; border: none; font-weight: 800; background: #1e293b; color: #64748b; cursor: not-allowed; transition: all 0.4s; display: inline-flex; align-items: center; gap: 1rem; }
    .gen-btn.ready { background: linear-gradient(135deg, var(--gpt-color), #2563eb); color: white; cursor: pointer; box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5); }
    .gen-btn.ready:hover { transform: scale(1.05) translateY(-5px); }

    /* VIEWER */
    .viewer { background: #f1f5f9; min-height: 100vh; color: #0f172a; display: flex; flex-direction: column; }
    .toolbar { background: #0f172a; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; transition: 0.2s; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .btn-print { background: var(--gpt-color); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    .btn-print:hover { transform: translateY(-3px); }

    .doc-container { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; gap: 3rem; }
    .page { background: white; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 15px solid; position: relative; font-family: 'Arial', sans-serif; border-radius: 8px; }
    .page.lec { border-top-color: var(--secondary-color); }
    .page.mat { border-top-color: var(--primary-color); }
    .page.sci { border-top-color: var(--science-color); }
    .pauta-page { border-top-color: #64748b !important; }

    .cover-header { display: flex; justify-content: space-between; border-bottom: 4px solid #cbd5e1; padding-bottom: 1.5rem; margin-bottom: 3rem; }
    .school-sig { display: flex; align-items: center; gap: 1rem; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; color: #1e293b;}
    
    .title-area { text-align: center; margin: 4rem 0; }
    .title-area h1 { font-size: 3.5rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -2px; text-transform: uppercase; }
    .title-area h2 { font-size: 2rem; color: #64748b; }
    
    .student-box { border: 3px solid #64748b; border-radius: 12px; padding: 2.5rem; margin-bottom: 3rem; }
    .s-row { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; font-weight: bold; font-size: 1.2rem; }
    .s-line { flex: 1; border-bottom: 2px solid #94a3b8; height: 1.5rem; }
    
    .instruct { background: #f8fafc; padding: 2.5rem; border-left: 8px solid #475569; border-radius: 0 12px 12px 0; }
    .instruct h3 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #0f172a; }
    .instruct li { margin-bottom: 1rem; font-size: 1.2rem; line-height: 1.6; color: #334155; }
    
    .q-flow { display: flex; flex-direction: column; gap: 4rem; }
    .q-item { page-break-inside: avoid; border-bottom: 1px dashed #cbd5e1; padding-bottom: 2rem; }
    .q-head { display: flex; gap: 1rem; font-size: 1.25rem; color: #0f172a; margin-bottom: 1.5rem; }
    .q-num { font-weight: 900; font-size: 1.5rem; color: #1e293b; min-width: 35px; }
    .q-text { line-height: 1.6; font-weight: 600; font-family: 'Arial', sans-serif;}

    .alts { display: flex; flex-direction: column; gap: 1.2rem; padding-left: 3rem; }
    .alt-row { display: flex; gap: 1rem; color: #1e293b; font-size: 1.2rem; line-height: 1.4; align-items: flex-start; }
    .alt-let { font-weight: 900; color: #0f172a; }
    
    .dev-box { margin-left: 3rem; margin-top: 2rem; border: 2px solid #cbd5e1; height: 250px; border-radius: 12px; padding: 1.5rem; background: #fdf8f6; }
    .dev-inner-lines { width: 100%; height: 100%; background-image: repeating-linear-gradient(transparent, transparent 31px, #cbd5e1 31px, #cbd5e1 32px); }

    .reading-box { border: 3px solid #e2e8f0; padding: 3rem; border-radius: 16px; margin-bottom: 3.5rem; background: #fff; box-shadow: inset 0 0 40px rgba(0,0,0,0.02); page-break-inside: auto; }
    .r-title { text-align: center; font-size: 2rem; font-weight: 900; margin-bottom: 2rem; color: #0f172a; border-bottom: 2px dotted #cbd5e1; padding-bottom: 1rem;}
    .r-txt { font-size: 1.25rem; line-height: 1.9; text-align: justify; color: #1e293b; white-space: pre-wrap; font-family: 'Times New Roman', serif;}

    /* OMR */
    .omr { border: 3px solid #0f172a; border-radius: 12px; padding: 3rem; margin-top: 3rem; }
    .omr-grid { display: flex; justify-content: space-around; gap: 2rem; flex-wrap: wrap; }
    .omr-col { display: flex; flex-direction: column; gap: 1.2rem; }
    .o-row { display: flex; align-items: center; gap: 1.5rem; }
    .o-num { width: 35px; font-weight: 900; font-size: 1.2rem; text-align: right; }
    .o-b { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 2px solid #0f172a; border-radius: 50%; font-size: 0.9rem; font-weight: bold; }

    /* PAUTA DOCENTE */
    .pauta-docente-header { background: #64748b; color: white; padding: 2rem; text-align: center; font-size: 2rem; font-weight: 900; text-transform: uppercase; border-radius: 12px; margin-bottom: 2rem; }
    .pauta-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 1.1rem; }
    .pauta-table th, .pauta-table td { border: 2px solid #cbd5e1; padding: 1rem; text-align: left; }
    .pauta-table th { background: #1e293b; color: white; font-weight: bold; text-transform: uppercase; }
    .pauta-table tr:nth-child(even) { background-color: #f8fafc; }
    .sol-dev { background: #fef3c7 !important; color: #b45309; }

    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .doc-container { padding: 0 !important; gap: 0 !important; }
      .page { box-shadow: none !important; margin: 0 !important; width: 100% !important; border-radius: 0 !important; page-break-after: always; padding: 2cm !important; }
      .page:last-child { page-break-after: auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const IconShield = () => <span style={{fontSize:'2.5rem'}}>🛡️</span>;
    const IconMetrenco = () => <span style={{fontSize:'2.5rem'}}>🏫</span>;

    // ==========================================
    // MOTOR CURRICULAR NATIVO PROCEDURAL (V10)
    // Cero red, 100% Offline y Perfecto matemáticamente.
    // ==========================================
    
    // Helpers Universales
    const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const rndArr = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const buildOpt = (correct, w1, w2, w3) => {
        let items = [String(correct), String(w1), String(w2), String(w3)].sort(() => Math.random() - 0.5);
        let correctaFinal = "";
        const alternativas = items.map((opt, i) => {
            const letter = ['A', 'B', 'C', 'D'][i];
            if (opt === String(correct)) correctaFinal = `${letter}) ${opt}`;
            return `${letter}) ${opt}`;
        });
        return { alternativas, correcta: correctaFinal };
    };

    // -------------------------------------------------------------
    // MATEMÁTICA 4TO BÁSICO
    // -------------------------------------------------------------
    const getMath4 = () => {
        const questions = [];
        // 1 al 18: Selección Múltiple
        for (let i = 1; i <= 18; i++) {
            const templateType = i % 6;
            let q = { id: i, tipo: "seleccion", eje: "Números y Álgebra", textoLectura: null, imageUrl: null };
            
            if(templateType === 1) { // Suma contextual
                let v1 = rnd(120, 480); let v2 = rnd(150, 400); let obj = rndArr(["entradas", "manzanas", "libros", "puntos"]); let nom = rndArr(["La escuela", "Javiera", "El supermercado", "Matías"]);
                q.enunciado = `${nom} recolectó ${v1} ${obj} en la mañana y ${v2} ${obj} por la tarde. ¿Cuál es el total de ${obj} recolectados?`;
                const ans = buildOpt(v1+v2, v1+v2+100, v1-v2+200, v1+v2-50);
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 2) { // Resta contextual
                let cap = rnd(800, 999); let rest = rnd(200, 500); let obj = rndArr(["pasajeros", "litros", "kilos"]); let veh = rndArr(["tren", "bus escolar", "barco"]);
                q.enunciado = `Un ${veh} tiene capacidad para ${cap} ${obj}. Si ya hay ${rest} ${obj} adentro, ¿cuánto espacio queda libre?`;
                const ans = buildOpt(cap-rest, cap-rest+100, cap+rest, cap-rest-10);
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 3) { // Multiplicación simple
                let t = rnd(4, 9); let mult = rnd(12, 45); let art = rndArr(["cajas", "paquetes", "bolsas"]); let ent = rndArr(["chocolates", "pastillas", "lápices"]);
                q.enunciado = `Si compramos ${t} ${art} y cada una trae ${mult} ${ent}, ¿cuántos ${ent} hay en total?`;
                const ans = buildOpt(t*mult, (t-1)*mult, t*mult+t, t*(mult+10));
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 4) { // División básica
                let divisor = rnd(3, 8); let resp = rnd(11, 25); let dividendo = divisor * resp;
                q.enunciado = `Un profesor desea repartir ${dividendo} galletas equitativamente entre ${divisor} estudiantes. ¿Cuántas galletas le tocan a cada uno?`;
                const ans = buildOpt(resp, resp+2, resp-1, resp+5);
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 5) { // Geometría - Perímetro
                q.eje = "Geometría"; let base = rnd(4, 15); let altura = rnd(2, 9);
                q.enunciado = `Un patio de forma rectangular mide ${base} metros de largo y ${altura} metros de ancho. ¿Cuál es su perímetro total?`;
                const perim = (base*2) + (altura*2);
                const ans = buildOpt(perim, base*altura, base+altura, perim*2);
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else { // Lectura de datos
                q.eje = "Datos y Probabilidades"; let l = rnd(10,30); let m = rnd(15,40); let w = rnd(5,20);
                q.enunciado = `En una encuesta de mascotas, los resultados fueron: Perros(${l}), Gatos(${m}), Aves(${w}). ¿Cuántos animales más son Perros que Aves?`;
                const ans = buildOpt(l-w, l+w, m-w, m-l);
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            }
            questions.push(q);
        }
        // 19 y 20: Desarrollo
        questions.push({ id: 19, tipo: "desarrollo", eje: "Números y Álgebra", textoLectura: null, imageUrl: null, enunciado: `Explica con tus propias palabras (sin usar números), cómo harías para asegurar que repartes una pizza redonda perfectamente a la mitad para dos amigos.`, alternativas: [], correcta: "Rúbrica: El estudiante debe mencionar herramientas de medición o el concepto de simetría partiendo desde el centro geométrico de la masa."});
        const vD = rnd(25, 45);
        questions.push({ id: 20, tipo: "desarrollo", eje: "Resolución de Problemas", textoLectura: null, imageUrl: null, enunciado: `Si entras a un supermercado y tienes $2000 pesos de presupuesto, y quieres llevar una caja de jugo de $${vD*10} y dos chocolates de $500. ¿Tienes el dinero suficiente o te falta? Escribe abajo toda tu operación y argumento.`, alternativas: [], correcta: `Rúbrica: Jugo=$${vD*10}. Chocolates=1000. Total=$${vD*10 + 1000}. El estudiante debe sumar correctamente y decir si excede o no los $2000.`});
        return questions;
    };

    // -------------------------------------------------------------
    // MATEMÁTICA 6TO BÁSICO
    // -------------------------------------------------------------
    const getMath6 = () => {
        const questions = [];
        for (let i = 1; i <= 18; i++) {
            const templateType = i % 6;
            let q = { id: i, tipo: "seleccion", eje: "Números y Álgebra", textoLectura: null, imageUrl: null };
            
            if(templateType === 1) { // Fracciones equivalentes
                let den1 = rnd(3, 8); let num1 = rnd(1, den1-1); let m = rnd(2, 5); let ansF = (num1*m)+"/"+(den1*m);
                q.enunciado = `¿Cuál de las siguientes fracciones es estrictamente equivalente a la fracción ${num1}/${den1}?`;
                const ans = buildOpt(ansF, (num1+1)+"/"+(den1*m), (num1*m)+"/"+(den1+m), num1+"/"+(den1*m));
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 2) { // Porcentajes
                let perc = rndArr([20, 25, 40, 50, 75]); let base = rnd(200, 900)*10;
                q.enunciado = `Un producto de tecnología cuesta $${base}. Si la tienda le aplica un descuento del ${perc}%. ¿De cuánto dinero es EXACTAMENTE la rebaja?`;
                const ansObj = (base * perc)/100;
                const ans = buildOpt("$"+ansObj, "$"+(ansObj+200), "$"+(base-ansObj), "$"+(ansObj*2));
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 3) { // Razones
                let r1 = rnd(2,5); let r2 = rnd(3,7); if(r1===r2)r1++; let f = rnd(4, 9);
                q.enunciado = `La razón entre estudiantes hombres y mujeres es de ${r1} a ${r2}. Si sabemos que hay ${r1*f} hombres. ¿Cuántas mujeres hay en el salón?`;
                const ans = buildOpt(r2*f, (r2+1)*f, r1*f*r2, r2*2);
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 4) { // Decimales multiplicacion
                let d1 = (rnd(11, 45)/10).toFixed(1); let i1 = rnd(2, 8);
                q.enunciado = `Don Alonso compra ${i1} kilos de paltas, cada kilo le cuesta $${d1} mil pesos. ¿Cuánto debe pagar en total en caja?`;
                const ansObj = (d1 * i1).toFixed(1);
                const ans = buildOpt("$"+ansObj+" mil", "$"+(parseFloat(ansObj)+1).toFixed(1)+" mil", "$"+(d1*10)+" mil", "$"+(parseFloat(ansObj)*2).toFixed(1)+" mil");
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 5) { // Área triángulo
                q.eje = "Geometría"; let b = rnd(5, 12); let h = rnd(4, 10);
                q.enunciado = `Si una figura triangular de madera tiene una base de ${b} cm y una altura de ${h} cm, ¿cuál es el área total de la madera necesaria?`;
                const area = (b*h)/2;
                const ans = buildOpt(area+" cm²", (b*h)+" cm²", (b+h)+" cm²", (area+10)+" cm²");
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else { // Patrones algebraicos
                q.eje = "Álgebra y Relaciones"; let n1 = rnd(2,5); let mult = rnd(3,6);
                q.enunciado = `Observa el siguiente patrón numérico de una máquina: Semana 1=${n1}, Semana 2=${n1+mult}, Semana 3=${n1+mult*2}... ¿Qué número aparecerá en la Semana 6?`;
                const r = n1 + (mult*5);
                const ans = buildOpt(r, r-mult, r+mult, r+mult*2);
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            }
            questions.push(q);
        }
        questions.push({ id: 19, tipo: "desarrollo", eje: "Álgebra", textoLectura: null, imageUrl: null, enunciado: `Escribe una pequeña historia de la vida real (problema matemático) que deba resolverse usando LA SIGUIENTE ecuación obligatoria: X + 1500 = 6000.`, alternativas: [], correcta: "Rúbrica: El estudiante debe inventar que tiene algo misterioso 'X', le sumaron 1500, y el total dio 6000. Debe tener sentido lingüístico y ser coherente."});
        const cm3 = rnd(12, 30);
        questions.push({ id: 20, tipo: "desarrollo", eje: "Geometría", textoLectura: null, imageUrl: null, enunciado: `Si un prisma rectangular (una caja de zapatos) tiene un Volumen calculado de ${cm3} cm³. Escribe 3 medidas diferentes imaginarias (largo, ancho, alto) que multiplicadas calcuelen armar esa misma caja y justifica.`, alternativas: [], correcta: `Rúbrica: Cualquier terna multiplicada cuyo producto sea ${cm3}. Por ejemplo, si es 24, puede ser 2x3x4 o 6x2x2. Debe explicar que el largo x ancho x alto conforman el volumen.`});
        return questions;
    };

    // -------------------------------------------------------------
    // TEXTOS Y LECTURAS (BASE DE DATOS)
    // -------------------------------------------------------------
    const TEXTOS_4TO = [
       "EL ALICANTO DEL NORTE\n\nEl Alicanto es un ave mitológica del desierto de Atacama que no puede volar, pero sus plumas brillan intensamente por la noche porque se alimenta de plata y oro de las minas profundas.\n\nCuenta la historia que los viejos mineros intentaban seguir al Alicanto en la oscuridad para que el ave los guiara hacia las ricas vetas de oro. Sin embargo, el Alicanto es muy inteligente. Si el pájaro se daba cuenta de que el minero que lo seguía era ambicioso y no agradecía a la tierra, apagaba la luz de sus alas repentinamente y dejaba al minero completamente perdido en pleno desierto.\n\nEs por esto que hoy en día, las pocas personas que dicen haber visto el destello del Alicanto, prefieren cerrar los ojos, dar las gracias al desierto y continuar por su propio rumbo sin seguirlo.",

    const TEXTOS_6TO = [

    const getReadingQuestions = (text1, text2, gradeTarget) => {

        let base2 = text1.includes('Flamencos') || text2.includes('Flamencos') ? [

        ] : [

           { enun: "¿Qué función crucial desempeñan los árboles grandes de coigües y robles para esta enredadera nativa?", ans: buildOpt("Fungen como escudos y columnas sólidas térmicas frente al invierno crudo.", "Le proporcionan sombra en pleno verano estricto.", "Sirven solo para que los pájaros lo busquen.", "Lo esconden de la lluvia fuerte.") },
           { enun: "Lee y concluye: Si un día talaran por completo todos los bosques sureños densos nativos, ¿qué pasaría con el ecosistema de la flor nacional?", ans: buildOpt("Sería fulminada debido al estrés térmico de las heladas y la soledad estructural.", "Se adaptaría inmediatamente mutando a arbusto pequeño.", "Comenzaría a florecer más y más roja.", "Nada, ya que prosperan donde sea.") },
           { enun: "La palabra 'aniquilada' en la penúltima línea del artículo científico resalta un tono de tipo:", ans: buildOpt("Alerta inminente ecológica severa.", "Tristeza profunda familiar.", "Alegría botánica.", "Indiferencia ambiental sistemática.") },

        let allLang = [];

        while(allLang.length < 18) {

        return questions;

    const getSci6 = () => {
        const questions = [];
        for (let i = 1; i <= 18; i++) {
            const templateType = i % 5;
            let q = { id: i, tipo: "seleccion", eje: "Ciencias", textoLectura: null, imageUrl: null };

                const ans = buildOpt(eMap[tem1], "sólido a estado plasmático", "gas constante a estado de sólido", "líquido a otro biotipo líquido oscuro");
                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            } else if (templateType === 3) {
                q.eje = "Medioambiente y Ecosistemas"; let ecos = rndArr(["la Amazonía", "el Bosque Valdiviano chileno", "el Mar de la zona central"]);
                q.enunciado = `En ${ecos}, si repentinamente una industria arrasa con los mayores depredadores de la pirámide (cima alimenticia), a corto y mediano plazo es científicamente probable que ocurra:`;
                const ans = buildOpt("Una desastrosa sobrepoblación biológica de los animales que servían de presa, destruyendo la flora.", "La pirámide entera desaparecería al día siguiente por falta del jefe.", "Nacerían crías nuevas genéticamente modificadas para mutar rápido.", "El clima cambiaría la lluvia para suplir faltas nutricionales.");

            } else if (templateType === 4) {

                q.enunciado = `El sistema vital del cuerpo que se encarga estrictamente de orquestar las respuestas mecánicas rapidísimas ante quemaduras o estrés (acto reflejo) operando mediante choques químicos sensitivos es:`;

                q.alternativas = ans.alternativas; q.correcta = ans.correcta;
            }
            questions.push(q);
        }
        questions.push({ id: 19, tipo: "desarrollo", eje: "Flujo Energético", textoLectura: null, imageUrl: null, enunciado: `Si pudieras diseñar un 'Super Auto' escolar basándote exclusivamente en fuentes de energía 100% RENOVABLE observadas en el campo chileno, ¿Qué tipos de energía usarías combinadas y por qué?`, alternativas: [], correcta: "Rúbrica: Explica lógicamente integración de paneles fotovoltaicos y turbinas de brisa austral u oceánica, o hidráulica. Fundamentando ser infinitas / no contaminantes."});

    };

              </div>
              
              <div className="omr">
                 <div style={{textAlign:'center', fontSize:'1.5rem', fontWeight:'900', marginBottom:'1rem'}}>{sjName.toUpperCase()}</div>
                 <div style={{textAlign:'center', marginBottom:'3rem', fontWeight:'bold', color:'#334155'}}>Pinte por completo el interior visual.</div>
                 
                 <div className="omr-grid">
                    {[0, 9].map(colStart => (
                      <div key={'col'+colStart} className="omr-col">
                        {mcqs.slice(colStart, colStart+9).map((q) => {
                           let realID = mcqs.indexOf(q) + 1;
                           return (
                             <div key={'omr'+q.id} className="o-row" style={{marginBottom:'0.5rem'}}>
                               <div className="o-num">{realID}</div>
                               <div className="o-b">A</div><div className="o-b">B</div><div className="o-b">C</div><div className="o-b">D</div>
                             </div>
                           )
                        })}
                      </div>
                    ))}
                 </div>
              </div>
            </div>

            {/* DOCUMENTO DOCENTE */}
            <div className="page pauta-page">
               <div className="pauta-docente-header">
                 MATERIAL EXCLUSIVO DOCENTE SUPERVISOR<br/>
                 <span style={{fontSize:'1.5rem', fontWeight:'600', color:'#e2e8f0'}}>SOLUCIONARIO V10 JAVASCRIPT NATIVO</span>
               </div>
               
               <table className="pauta-table">
                  <thead>
                    <tr>
                      <th style={{width:'50px', textAlign:'center'}}>Num</th>
                      <th style={{width:'150px'}}>EJE DE TRABAJO</th>
                      <th style={{width:'80px', textAlign:'center'}}>TIPO</th>
                      <th>RESOLUCIÓN Y CONCLAVE CORRECTA</th>
                    </tr>
                  </thead>
                  <tbody>
                    {test.map((q, idx) => (
                      <tr key={'p'+q.id}>
                        <td style={{textAlign:'center', fontWeight:'bold', fontSize:'1.3rem'}}>{idx+1}</td>
                        <td style={{fontWeight:'bold', color:'#475569', fontSize:'0.9rem'}}>{q.eje}</td>
                        <td style={{textAlign:'center', fontSize:'0.85rem'}}>{q.tipo === 'seleccion' ? 'Opción' : 'Mano Libre'}</td>
                        <td className={q.tipo === 'desarrollo' ? 'sol-dev' : ''}>
                           {q.tipo === 'seleccion' ? (
                             <strong style={{color:'#2563eb', fontSize:'1.2rem'}}>{q.correcta.substring(0, 2)}</strong>
                           ) : (
                             <div style={{fontWeight:'bold'}}>{q.correcta}</div>
                           )}
                           {q.tipo === 'seleccion' && <span style={{marginLeft:'0.5rem', color:'#475569'}}>{q.correcta.substring(3)}</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
               </table>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
